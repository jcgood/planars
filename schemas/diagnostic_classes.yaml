# Diagnostic Classes
# Normative schema for analysis classes used in diagnostics_{lang_id}.tsv.
#
# THIS FILE IS THE SOURCE OF TRUTH FOR:
#   - Which analysis classes exist and what they cover
#   - When each class is applicable (universal vs. conditional)
#   - Whether a class uses one general construction or is construction-specific
#   - Which diagnostic criteria each class requires or allows
#   - Qualification rules: how spans are computed from criterion values for each class
#   - Known construction types (non-exhaustive examples for variable classes)
#
# THIS FILE IS NOT THE SOURCE OF TRUTH FOR:
#   - What each diagnostic criterion means linguistically or what values it accepts
#     → see schemas/diagnostic_criteria.yaml
#   - Definitions of span types and analytical terms (strict, loose, partial, complete)
#     → see schemas/terms.yaml
#   - Planar structure concepts (what positions, elements, keystone are)
#     → see schemas/planar.yaml
#   - Per-language instances of these classes
#     → see coded_data/{lang_id}/planar_input/diagnostics_{lang_id}.tsv
#
# Relationship to other files:
#   schemas/diagnostic_criteria.yaml — diagnostic criterion semantics and allowed values
#   schemas/diagnostic_classes.yaml (this file) — class structure, applicability, qualification rules
#   schemas/planar.yaml             — planar structure ontology (positions, elements, columns)
#   schemas/terms.yaml              — analytical vocabulary (strict/loose span, partial/complete)
#   diagnostics_{lang_id}.tsv       — per-language instance of these classes, validated against this file
#   docs/analyses.md                — human reader's guide pointing to all schema files
#
# check-codebook validates diagnostics_{lang_id}.tsv against this file:
#   - required diagnostic criteria must be present as columns
#   - conditional classes should have applicability_conditions met
#   - construction names follow the naming rules for each specificity type
#
# Human-editable workflow: edit this file, then ask Claude to propagate changes
# to diagnostics_{lang_id}.tsv and scaffold any new analysis modules.
#
# Fields:
#   name                     machine name (matches planars/ module and coded_data/ folder)
#   display_name             human-readable label for notebook section headers
#   domain_type              morphosyntactic | phonological | indeterminate
#   domain_subtype           segmental | prosodic  (optional; phonological classes only)
#   applicability            universal | conditional
#   applicability_conditions prose description of when a conditional class applies
#   specificity              general | construction_specific
#   known_constructions      non-exhaustive examples (construction_specific classes only)
#   required_criteria        diagnostic criterion columns that must appear in diagnostics_{lang_id}.tsv for this class
#   optional_criteria        diagnostic criterion columns that may appear but are not required
#   status                   stable | "[NEEDS REVIEW]" | "[PLACEHOLDER]"
#   criterion_set_status     stable | "[PROVISIONAL]" (expected to grow as more languages
#                            are analyzed; note explains known gaps or open questions)
#   collection_required      "[NEEDS COORDINATOR INPUT]" until coordinator decides;
#                            true = must appear in diagnostics_{lang_id}.tsv for every language;
#                            false = optional (conditional on language-specific phenomena)

classes:

  # ---------------------------------------------------------------------------
  # Morphosyntactic domain classes
  # ---------------------------------------------------------------------------

  - name: ciscategorial
    display_name: "Ciscategorial"
    domain_type: morphosyntactic
    applicability: universal
    applicability_conditions: >
      Applies to every verbal planar structure. All languages have elements that
      combine selectively with part-of-speech categories; the ciscategorial domain
      is the span of positions whose elements combine exclusively with verbs (as
      opposed to nouns or adjectives). NOTE: predicate-flexible languages (e.g.,
      Chorote ch. 15) allow non-verbal predicates to take "verbal" TAME markers,
      complicating the strict V-combines test. In such languages, fracture into
      "predicate-only ciscategorial" (strict) and "with-predicate ciscategorial"
      (elements that select predicates broadly) may be needed.
    specificity: general
    required_criteria: [V-combines, N-combines, A-combines]
    optional_criteria: [PRED-combines]  # predicate-flexible languages (e.g., Araona,
      # Chorote ch. 15) where non-verbal predicates take verbal TAME markers — issue #39.
    qualification_rule: >
      An element is v-ciscategorial if V-combines=y AND N-combines=n AND A-combines=n
      (and any further combine parameters are also n).
      A position is complete if ALL its elements are v-ciscategorial.
      A position is partial if AT LEAST ONE element is v-ciscategorial.
    status: stable
    collection_required: "[NEEDS COORDINATOR INPUT]"
    criterion_set_status: "[PROVISIONAL]"  # Criterion set may grow further as more
      # predicate-flexible languages are onboarded; other *-combines types not yet attested.

  - name: subspanrepetition
    display_name: "Subspan Repetition"
    domain_type: morphosyntactic  # maximal (widescope) domain; per ch. 01 the minimal
    # (narrowscope/fillable) domain is classified as indeterminate in the book's taxonomy
    # because it is ambiguous between ellipsis (phonological) and gapping (morphosyntactic).
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has constructions in which a contiguous subspan
      of the verbal planar structure repeats across two or more conjoined or embedded
      clauses (e.g., coordination, complementation, serial verb constructions, clause
      linkage). At least one such construction must be identifiable for annotation.
    specificity: construction_specific
    known_constructions:
      # Non-exhaustive examples. Add language-specific construction names as needed.
      # Asyndetic (no overt linker)
      - asyndetic coordination         # no overt marker; e.g., Chatino (primary strategy)
      - asyndetic juxtaposition        # verb complexes juxtaposed; e.g., Quechua
      - asyndetic clause combination   # e.g., Mocoví
      - asyndetic verb-verb linkage    # complement clause juxtaposition; e.g., Mixtec AVVL
      # Overt coordinators
      - and-coordination               # e.g., Araona, Mixtec ta, Chorote jla'yi ti/ka
      - or-coordination                # e.g., Mixtec an, Chorote ni'ne ti/ka
      - and-then clause linkage        # e.g., Mocoví kan
      - syndetic coordination          # overt coordinator; e.g., Chatino lóʔō
      # Subordination and embedding
      - complementation                # complement clause embedding
      - complement clause              # e.g., Yukuna -ka nominalization
      - complement subordination       # non-finite complement; e.g., Mebengokre =je
      - finite declarative complement clause   # e.g., Martinican
      - ña-linkage                     # complementizer subordination; e.g., Mixtec
      - syndetic clause linkage        # purpose/cause/concessive connector; e.g., Mixtec
      - adverbial clause               # e.g., Yukuna
      - purpose subordination          # e.g., Mebengokre kadjy
      # Clause chaining
      - clause linkage                 # e.g., Araona tso-clause linkage
      - same-subject clause chaining   # e.g., Yukuna, Mebengokre ne/=n
      - simultaneous clause chaining   # boundary suffix -yóʔ; e.g., Hup
      - sequential clause chaining     # boundary suffix -mɨʔ; e.g., Hup
      # Auxiliaries and causatives
      - auxiliary construction         # e.g., Araona auxiliary construction
      - lexical causative construction # minimal subspan; e.g., Mocoví
      # Reduplication and parallelism
      - total reduplication            # verb repeated in full; e.g., Mazatec
      - verbal parallelism             # same construction with different verb; e.g., Mazatec
      # Nominalization
      - nominalization                 # general nominalized clause; e.g., Mazatec
      - nominalized clause combination # gerundive/obligatative/habitual/prior-event; e.g., Quechua
      # Serial verbs
      - serial verb construction       # verb serialization; e.g., Hup
    required_criteria: [widescope_left, widescope_right, fillable_botheither_conjunct]
    optional_criteria: []
    qualification_rule: >
      Five span categories are derived:
        maximum_fillable:          fillable_botheither_conjunct=y
        maximum_widescope_left:    widescope_left=y
        maximum_widescope_right:   widescope_right=y
        maximum_narrowscope_left:  widescope_left=n  (element lacks wide scope left)
        maximum_narrowscope_right: widescope_right=n (element lacks wide scope right)
      Each category produces complete and partial position sets and four spans
      (strict/loose x complete/partial).
    status: stable
    collection_required: "[NEEDS COORDINATOR INPUT]"
    criterion_set_status: "[PROVISIONAL]"  # Construction types are open-ended and expected
      # to grow as more languages are added. Criterion names may also need refinement as
      # additional construction types are attested.

  - name: noninterruption
    display_name: "Noninterruption"
    domain_type: morphosyntactic
    applicability: universal
    applicability_conditions: >
      Applies to every verbal planar structure. All languages have bound and free
      elements; the non-interruption domain tests which contiguous spans cannot be
      broken by free or multiply-occurring free elements.
    specificity: general
    required_criteria: [free, multiple]
    optional_criteria: []
    qualification_rule: >
      Two domain types, each with complete and partial position sets:
        no-free domain:     element qualifies if free=n (bound).
        single-free domain: element qualifies if free=n OR (free=y AND multiple=n).
      Only strict spans are computed for non-interruption (no loose span).
    status: stable
    collection_required: "[NEEDS COORDINATOR INPUT]"
    criterion_set_status: stable

  - name: nonpermutability
    display_name: "Nonpermutability"
    domain_type: morphosyntactic
    applicability: universal
    applicability_conditions: >
      Applies to every verbal planar structure. All languages have ordering constraints
      among verbal elements; the non-permutability domain tests the span over which
      linear ordering is strictly or conditionally fixed.
    specificity: general
    required_criteria: [permutable, scopal]
    optional_criteria: []
    qualification_rule: >
      Two domain types, each with complete and partial position sets = 4 strict spans.
      Both use strict span only (no loose span) — a non-permutable domain is inherently
      contiguous.

      Complete vs. partial:
        partial:  any element in the position satisfies the qualification rule
                  (easier to qualify → larger domain).
        complete: all elements in the position satisfy the qualification rule
                  (harder to qualify → smaller domain).

      Strict non-permutability — blocked by: permutable=y AND scopal=n.
        Positions where ALL (complete) or ANY (partial) elements have permutable=n.
        Identifies spans with absolutely fixed ordering under all circumstances.

      Flexible non-permutability — blocked by: permutable=y AND scopal=n.
        Positions where ALL (complete) or ANY (partial) elements have
        permutable=n OR (permutable=y AND scopal=y). Extends the strict domain
        to include positions whose elements can permute but only with a scopal
        interpretation difference (fixed vs. scope-varying ordering counts
        as "non-permutable" under this interpretation).
    criterion_set_status: "[PROVISIONAL]"  # Known gaps: verb-class-conditioned permutability
      # (issue #67) and fluid/multi-position formatives (issue #66) may require additional
      # parameters once the linguistic questions are resolved.
    # Note: zone-internal permutability (variable ordering NOT conditioned by scope, e.g.,
    # Quechua TAME zone, Mocoví trlocdir) annotates as permutable=y, scopal=n — these
    # positions fall outside both strict and flexible domains. Confirmed across 5+ languages.
    status: "[AUTO-DERIVED: likely stable — qualification rules confirmed across 5+ language
    collection_required: "[NEEDS COORDINATOR INPUT]"
      chapters (ch. 3, 6, 8, 9, 12, 14, 16); coordinator sign-off needed to remove AUTO-DERIVED]"

  - name: free_occurrence
    display_name: "Free Occurrence"
    domain_type: indeterminate
    applicability: universal
    applicability_conditions: >
      Applies to every verbal planar structure. All languages have free and bound
      elements; the free occurrence domain identifies the span of positions containing
      elements that can constitute a standalone utterance. Classified as indeterminate
      because free occurrence straddles morphosyntactic and phonological criteria
      (Tallman et al. 2024, ch. 1).
    specificity: general
    required_criteria: [free]
    optional_criteria: [multiple]  # present when noninterruption is run on the same sheet
    qualification_rule: >
      The free occurrence domain = positions where free=y.
      Four span variants (strict/loose × complete/partial) = 4 spans total.
        complete: ALL elements in the position have free=y.
        partial:  AT LEAST ONE element in the position has free=y.
      Both strict and loose spans are computed (unlike noninterruption, which uses
      strict-only, free occurrence domains need not be contiguous).

      Note on minimal vs. maximal free occurrence (Tallman et al. 2024, ch. 1):
      The Introduction distinguishes the minimal free occurrence domain (the smallest
      span that can stand as an independent utterance) from the maximal free occurrence
      domain (the largest such span). In the planar framework these correspond to the
      strict complete span (conservative/minimal) and the loose partial span
      (liberal/maximal) respectively. No additional criterion is needed.
    status: stable
    collection_required: "[NEEDS COORDINATOR INPUT]"
    criterion_set_status: stable

  - name: proform
    display_name: "Proform"
    domain_type: morphosyntactic
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has proforms (pronouns, pro-verbs, pro-VP substitutes,
      etc.) that can replace a contiguous span within the verbal planar structure. The
      proform domain is the span the proform substitutes for.
    specificity: general
    required_criteria: [substitutable]
    optional_criteria: []
    qualification_rule: >
      A position qualifies if it contains an element where substitutable=y. Complete
      qualification: ALL elements have substitutable=y. Partial qualification: at
      least one element has substitutable=y.
    criterion_set_status: "[PROVISIONAL]"  # Class itself is [NEEDS REVIEW]; criterion set
      # may need refinement once real annotation data exists. Proform type (pronoun,
      # pro-verb, pro-VP) may warrant a criterion distinguishing substitution scope.
    status: "[NEEDS REVIEW]"  # Ch. 17 line 543 explicitly states proform was NOT included in
    # the published database: "There are other tests that have not yet been included in the
    # database (e.g. proform replacement)." No evidence in 10 reviewed language chapters.
    # Prospective class — applicable only where proform substitution can be elicited.
    collection_required: "[NEEDS COORDINATOR INPUT]"

  - name: idiom
    display_name: "Idiom"
    domain_type: morphosyntactic
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has idiomatic expressions within the verbal planar
      structure — collocations of verbal elements whose combined meaning is not
      compositionally predictable from the individual elements. One construction per TSV.
    specificity: construction_specific
    known_constructions:
      # One TSV per idiomatic collocation. Names should describe the idiom briefly.
      - verb-particle idiom
      - verb-affix collocation
    required_criteria: [idiomatic]
    optional_criteria: []
    qualification_rule: >
      A position qualifies if it contains an element where idiomatic=y. Complete
      qualification: ALL elements have idiomatic=y. Partial qualification: at
      least one element has idiomatic=y.
    criterion_set_status: stable  # Single binary criterion is appropriate; idiom identity
      # is encoded in the construction name, not additional parameters.
    status: "[NEEDS REVIEW]"  # Mebengokre (ch. 12) provides the clearest evidence: diagnostic
    # [\ref{idioms}] documents 3 specific idioms with position spans (adjnc-ket). The class
    # design is sound but needs annotation data.
    collection_required: "[NEEDS COORDINATOR INPUT]"

  - name: biuniqueness
    display_name: "Biuniqueness"
    domain_type: indeterminate
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has circumfixes (morphemes discontinuous across
      two positions) or extended exponents (the same morphosyntactic feature expressed
      by morphs in multiple positions). The biuniqueness domain is the span from the
      leftmost piece of the discontinuous morpheme to the rightmost. Each circumfix
      or extended exponent group is annotated in its own TSV. Classified as indeterminate
      (Tallman et al. 2024).
      NOTE: This class covers only the circumfixal/extended-exponent type (e.g., Araona
      pi-...-ma). Non-automatic allomorphy (TAM-conditioned suppletion, inflectional-class
      allomorphy, valency allomorphy, etc.) is a distinct biuniqueness deviation confirmed
      across many languages: Zapotec (ch. 07), Yukuna (ch. 11), Kiowa (ch. 04), Mixtec
      (tonal inflection classes), Chatino (TAM tonal alternations), Chorote (causative/
      antipassive allomorphy), Mocoví (3rd-person prefix sets) — see issue #58.
    specificity: construction_specific
    known_constructions:
      # One TSV per discontinuous morpheme or extended exponent group.
      - negation circumfix       # e.g., Araona pi-...-ma
      - interactional circumfix  # e.g., Araona ja-...-ti
      - perfective circumfix
      - extended exponent
    required_criteria: [biunique]
    optional_criteria: []
    qualification_rule: >
      A position qualifies if it contains an element where biunique=n. Complete
      qualification: ALL elements in the position have biunique=n. Partial
      qualification: at least one element has biunique=n. The loose partial span
      is the most semantically informative: it extends from the position of the
      prefixal piece to the position of the suffixal piece, directly identifying
      the extended exponent domain.
    criterion_set_status: stable  # Single binary criterion is appropriate for the
      # circumfix/extended-exponent type. Non-automatic allomorphy (issue #58) is a
      # distinct class, not an extension of this criterion set.
    status: "[NEEDS REVIEW]"  # Formal abstract type in book's ch. 17 database schema.
    # Ch. 17 line 554 explicitly acknowledges the class is "relatively superficially
    # considered" and that "a great deal of complexity and variation is hidden behind such
    # designations" — direct book-level support for issue #58 (non-automatic allomorphy
    # as a distinct sub-type). Araona circumfix data is annotated; other types pending.
    collection_required: "[NEEDS COORDINATOR INPUT]"

  - name: repair
    display_name: "Repair"
    domain_type: phonological
    applicability: conditional
    applicability_conditions: >
      Applicable when elicitation can test repair/restart behavior — i.e., when speakers
      can be prompted to make production errors within the verbal complex and their restart
      behavior reveals a coherent span. The repair domain is the minimal span such that an
      error anywhere inside it triggers restart from the left edge.
    specificity: general
    required_criteria: [restart]
    optional_criteria: []
    qualification_rule: >
      A position qualifies if it contains an element where restart=y. Complete
      qualification: ALL elements in the position have restart=y. Partial
      qualification: at least one element has restart=y.
    criterion_set_status: stable  # Single binary criterion is appropriate; restart
      # behavior is categorical (yes/no per position).
    status: "[NEEDS REVIEW]"  # Strongly confirmed by Cup'ik ch. 2 (4 naturalistic examples,
    # restart domain = vbase–pn4); no evidence in 8 other reviewed chapters. Applicable
    # only where elicitation can target production errors within the verbal complex.
    collection_required: "[NEEDS COORDINATOR INPUT]"

  # ---------------------------------------------------------------------------
  # Phonological domain classes
  # ---------------------------------------------------------------------------

  - name: stress
    display_name: "Stress"
    domain_type: phonological
    domain_subtype: prosodic
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has a productive primary stress system in the verbal
      domain, where stress can be assigned to or blocked within a defined span around
      the verbal keystone. Requires elicitation data sufficient to determine whether
      stress is obligatory and/or independent for each position.
    specificity: general
    required_criteria: [stressed, independence, obligatory, left-interaction, right-interaction]
    optional_criteria: []
    qualification_rule: >
      Two domain types, each with complete and partial subtypes = 4 spans total.
      Both use blocked_span: expand from ROOT in each direction, stopping just
      before the first position where the blocking condition holds. The blocking
      position is excluded.

      Complete vs. partial blocking:
        partial:  any element in the position satisfies the blocking condition
                  (easier to block → smaller domain).
        complete: all elements in the position satisfy the blocking condition
                  (harder to block → larger domain).

      The keystone (v:verbstem) always remains part of the domain. Its criterion
      values participate in blocking checks — its values can trigger a domain
      boundary for positions beyond it — but it is never itself excluded from the
      span. We are looking for the stress domain around the head of the clause only.

      Minimal stress domain — blocked by: stressed ∈ {y, both} AND independence = y.
        An independently-stressed element begins a new stress domain; the minimal
        domain ends just before it.

      Maximal stress domain — blocked by: obligatory = y AND independence = y.
        An obligatorily-independent stress element creates a hard boundary; the
        maximal domain extends up to but not including that position.
    criterion_set_status: "[PROVISIONAL]"  # left-interaction and right-interaction are
      # [NEEDS REVIEW] — their role in the qualification rule is unresolved (issue #17).
      # They may be removed, renamed, or replaced depending on resolution of meso/interaction
      # domain design (issues #16, #17).
    # Note: in the book's ch. 17 abstract type taxonomy, stress is a fracture of the
    # suprasegmental abstract type (not a separate type). planars treats it as a distinct
    # module because it uses blocked_span logic rather than positive qualification.
    status: stable  # Note: left-interaction and right-interaction are [NEEDS REVIEW] (issue #17)
    collection_required: "[NEEDS COORDINATOR INPUT]"

  - name: aspiration
    display_name: "Aspiration"
    domain_type: phonological
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has a prosodic aspiration domain defined by blocking
      conditions — i.e., when aspiration's distribution relative to the verbal keystone
      defines a bounded span via independent/obligatory criteria (same logic as stress.py).
      NOTE: Aspiration as a segmental spreading process (as in Yukuna ch. 11) should be
      annotated under the `segmental` class instead. This module is for the blocked-span
      prosodic case only. No confirmed language data exists for this module yet — see
      issue #60.
    specificity: general
    required_criteria: [stressed, independence, obligatory, left-interaction, right-interaction]
    optional_criteria: []
    qualification_rule: >
      Mirrors the stress domain logic. Two domain types (minimal, maximal) using
      blocked_span with the same blocking conditions as stress. The keystone
      participates in blocking checks (same as stress). If aspiration requires
      different domain logic once data is collected, update this entry and
      aspiration.py accordingly.
    criterion_set_status: "[PROVISIONAL]"  # Inherits the same open questions as stress
      # re: left-interaction and right-interaction (issues #16, #17). Additionally, the
      # scope of this class is itself unresolved (issue #60) — criterion set may change
      # substantially depending on whether this remains a blocked_span module.
    # Note: criterion names are reused from stress; see diagnostic_criteria.yaml aspiration entry.
    # Note: in the book's ch. 17 abstract type taxonomy, aspiration is a fracture of the
    # suprasegmental abstract type (not a separate type). planars treats it as a distinct
    # module because it uses blocked_span logic, same as stress.py.
    status: "[NEEDS REVIEW]"  # No confirmed data; scope unclear — see issue #60
    collection_required: "[NEEDS COORDINATOR INPUT]"

  - name: segmental
    display_name: "Segmental"
    domain_type: phonological
    domain_subtype: segmental
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has a segmental phonological process (vowel deletion,
      consonant coalescence, nasality spreading, palatalization, etc.) that applies within
      a defined span of the verbal planar structure. One process per TSV. Multiple segmental
      processes may identify different spans.
    specificity: construction_specific
    known_constructions:
      # One TSV per segmental process. Non-exhaustive examples.
      - vowel syncope domain           # e.g., Araona: vcore-tamesuf
      - consonant coalescence domain   # e.g., Cup'ik uvular-velar: vbase-pn4
      - nasality spreading domain      # e.g., Chatino: positions 13-17
      - palatalization domain          # e.g., Chatino coronal, Chorote, Mocoví
      - vowel elision domain           # hiatus resolution; e.g., Chatino verbal prefix domain
      - vowel fusion domain            # pronoun vowel fusion; e.g., Chatino pos. 13-17
      - vowel overwriting domain       # CVʔV + vowel-initial pronoun; e.g., Mixtec
      - vowel copying domain           # morphophonological copying; e.g., Hup
      - final consonant deletion domain  # coda deletion at suffix boundary; e.g., Hup
      - syncope domain                 # high-vowel deletion in prefixed stems; e.g., Mebengokre
      - echo vowel epenthesis domain   # stem-final epenthesis; e.g., Mebengokre
      - fortition domain               # palatal fortition; e.g., Mebengokre aj-verb
      - suffix deletion domain         # function word final-syllable deletion; e.g., Quechua
      - vowel lowering domain          # /u,i/→[o,e] near /q/; e.g., Quechua
      - yod insertion domain           # /y/ epenthesis at vowel juncture; e.g., Chorote
      - vowel harmony domain           # verb- or affix-conditioned harmony; e.g., Mocoví
      - vocalic epenthesis domain      # cluster resolution; e.g., Mocoví
      - h-metathesis domain            # e.g., Cherokee
      - vowel deletion domain          # e.g., Cherokee
      - final apocope domain           # e.g., Cherokee
    required_criteria: [applies]
    optional_criteria: []
    qualification_rule: >
      A position qualifies if it contains an element where applies=y. Complete
      qualification: ALL elements in the position have applies=y. Partial
      qualification: at least one element has applies=y.
    criterion_set_status: stable  # Single binary criterion is appropriate; the process
      # identity is encoded in the construction name. No cross-language evidence suggests
      # additional parameters are needed.
    # Formal abstract type in ch. 17 database schema. Note: `stress` and `aspiration` are
    # separate planars modules but are fractures of this abstract type in the book's taxonomy.
    status: "[AUTO-DERIVED: likely stable — confirmed across 10+ language chapters; formal
    collection_required: "[NEEDS COORDINATOR INPUT]"
      abstract type in ch. 17; coordinator sign-off needed to remove AUTO-DERIVED]"

  - name: suprasegmental
    display_name: "Suprasegmental"
    domain_type: phonological
    domain_subtype: prosodic
    applicability: conditional
    applicability_conditions: >
      Applicable when the language has a suprasegmental or prosodic rule (pitch-accent
      assignment, iambic stress foot, tone melody, etc.) with a positively delimited domain
      in the verbal planar structure. Distinct from stress.py and aspiration.py, which use
      blocked_span logic; this module uses positive qualification (positions annotated as
      inside or outside the domain). One rule per TSV.
    specificity: construction_specific
    known_constructions:
      # One TSV per suprasegmental rule. Non-exhaustive examples.
      - pitch-accent domain       # e.g., Araona LH*: vpref-connect3; Quechua L+H*: vcore-plural
      - iambic foot domain        # e.g., Cup'ik: vbase-pn4
      - tone melody domain        # e.g., Chatino TAM tonal alternations: pos. 10-13
      - H1-spreading domain       # e.g., Cherokee: pos. 11-21
      - H3-assignment domain      # e.g., Cherokee: pos. 5/7-21
      - superhigh-assignment domain  # e.g., Cherokee: pos. 5/7-22
