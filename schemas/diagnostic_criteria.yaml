# Diagnostic Criteria
#
# THIS FILE IS THE SOURCE OF TRUTH FOR:
#   - Diagnostic criteria (annotation columns): their names, allowed values, and
#     linguistic definitions (what each y/n value means in the field)
#   - Shared criterion values (y, n, NA, ?)
#
# THIS FILE IS NOT THE SOURCE OF TRUTH FOR:
#   - Which analysis classes exist, when they apply, or what constructions they cover
#     → see schemas/diagnostic_classes.yaml
#   - Which diagnostic criteria are required or optional for each class
#     → see schemas/diagnostic_classes.yaml (required_criteria / optional_criteria)
#   - Qualification rules (how spans are computed from criterion values)
#     → see schemas/diagnostic_classes.yaml (qualification_rule field)
#   - Definitions of span types and analytical terms (strict, loose, partial, complete)
#     → see schemas/terms.yaml
#   - Planar structure ontology (positions, elements, structural columns)
#     → see schemas/planar.yaml
#   - Per-language instances of these classes
#     → see coded_data/{lang_id}/lang_setup/diagnostics_{lang_id}.tsv
#
# Definitions draw on the theoretical framework in:
# Tallman, Auderset & Uchihara (eds.) (2024), "Constituency and convergence in the Americas",
# Topics in Phonological Diversity 1, Language Science Press. doi:10.5281/zenodo.10559861
# but this toolkit reflects ongoing research that extends beyond that work.
# Edit definitions directly here; render_codebook.py produces human-readable output.

# ---------------------------------------------------------------------------
# DIAGNOSTIC CRITERIA BY ANALYSIS
# ---------------------------------------------------------------------------

analyses:

  - name: ciscategorial
    description: >
      Tests which elements in the planar structure combine with only one part-of-speech
      category (ciscategorial selection). A ciscategorial domain is a contiguous subspan
      of positions whose elements can semantically combine with only one category class
      (V, N, or A). Elements that combine with multiple categories are transcategorial.
    diagnostic_criteria:

      - name: V-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a verbal head (verb root).
          An element that combines only with V (V-combines=y, N-combines=n, A-combines=n)
          is v-ciscategorial.

      - name: N-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a nominal head (noun root).

      - name: A-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with an adjectival head.

      - name: PRED-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a predicative head of any
          category (verbal, nominal, or adjectival). Used in predicate-flexible languages
          where non-verbal predicates take the same TAME markers as verbal predicates
          (e.g. Araona). An element with PRED-combines=y is transcategorial and therefore
          not v-ciscategorial. Optional: omit for languages where no such category exists.

  - name: subspanrepetition
    description: >
      Tests which positions participate in subspan repetition — a construction in which
      a contiguous subspan of the planar structure occurs more than once (e.g. coordination,
      complementation, serial verb constructions). Fractured by scope (widescope vs.
      narrowscope) and fillability.
    diagnostic_criteria:

      - name: widescope_left
        values: [y, n]
        description: >
          Whether the element takes wide scope to the left in a subspan repetition
          construction — i.e., it appears in one conjunct but has semantic scope over
          multiple conjoined spans to its left. Elements with wide scope are outside
          the minimal (narrowscope) subspan repetition domain.

      - name: widescope_right
        values: [y, n]
        description: >
          Whether the element takes wide scope to the right in a subspan repetition
          construction. See widescope_left.

      - name: fillable_botheither_conjunct
        values: [y, n]
        description: >
          [PLACEHOLDER] Whether the element is fillable in both conjuncts, either
          conjunct, or a single conjunct of the subspan repetition construction.

  - name: noninterruption
    description: >
      Tests morphosyntactic non-interruption: a span that cannot be interrupted by
      free or multiply-occurring free elements. Two domain types are derived based
      on what counts as an interruptor.
    diagnostic_criteria:

      - name: free
        values: [y, n]
        description: >
          Whether the element is morphosyntactically free — i.e., it can occur as a
          standalone utterance independently of the verbal head. Bound elements (free=n)
          cannot occur independently.

      - name: multiple
        values: [y, n]
        description: >
          Whether the element can occur more than once within the domain (multiply-occurring).
          Only meaningful when free=y. A singly-occurring free element (free=y, multiple=n)
          does not interrupt the single-free domain.

  # stress is retired as of issue #100 — now handled by metrical
  # (construction stress_domain). Criteria moved to metrical section below.

  - name: metrical
    description: >
      Tests which positions fall within a metrical or prosodic domain of the verbal
      planar structure. Dispatch-based module: blocked-span constructions (e.g.,
      stress_domain) use accented/obligatory/independence to derive domain boundaries;
      positive-qualification constructions (e.g., pitch-accent domain, iambic foot
      domain) use applies. One construction per TSV.

      Blocked-span criteria derive two domain types based on different notions of
      metrical boundary (see issues #16, #17 for meso and interaction domains).
    diagnostic_criteria:

      - name: applies
        values: [y, n]
        description: >
          Whether the metrical process applies to this element's position.
          y = this position is within the domain of the metrical rule.
          Used by positive-qualification constructions (e.g., pitch-accent domain,
          iambic foot domain).

      - name: accented
        values: [y, n, both]
        description: >
          Whether the element can carry primary stress (or the analogous metrical
          prominence). y = always accented; n = never accented; both = variably
          accented depending on context. Used by blocked-span constructions
          (e.g., stress_domain).

      - name: obligatory
        values: [y, n]
        description: >
          Whether stress is obligatory on this element (i.e., the element must
          bear stress when present). Designed to handle situations where an
          intervening element may require stress (e.g., a full NP argument)
          which would block prosodic integration with the keystone's domain
          (e.g., a verbal particle). Contrastive example: "[picked up] the ball"
          versus "[pick] the ball [up]".

      - name: independence
        values: [y, n]
        description: >
          Whether the element's stress is independent of the keystone. Can be
          operationalized as: can this element be accented when the keystone is
          also accented?

      - name: left-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW — see issue #17] Whether the element's stress interacts
          with elements in the planar position directly to its left.

      - name: right-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW — see issue #17] Whether the element's stress interacts
          with elements directly to its right.

  - name: nonpermutability
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Qualification rule redesigned Apr 2026 (issue #116)
      to use a pair-row annotation model. The old per-element permutable/scopal
      column model has been replaced. Verify before use.

      Tests which positions fall within the non-permutability domain of the verbal
      planar structure. The annotation sheet lists PAIRS of elements that can be
      variably ordered (Option C enumeration from the planar structure). Annotators
      assess scopal for each pair. Strict non-permutability is derived from the planar
      structure, not annotated. Three span types result (strict, minimal flexible,
      maximal flexible). See schemas/diagnostic_classes.yaml for the full qualification
      rule and schemas/terms.yaml for span label definitions.
    diagnostic_criteria:

      - name: scopal
        values: [y, n, both]
        description: >
          Used in two annotation stages (issue #116, Apr 2026):

          STAGE 1 (element_prescreening sheet — element-level, values y/n/both):
            y    = element's variable orderings are always scopally conditioned.
            n    = element has no meaningful variable ordering; filtered from Stage 2.
            both = element has mixed orderings (some scopal, some freely variable);
                   included in Stage 2.

          STAGE 2 (general/pairs sheet — pair-level, values y/n only):
            Pair-level criterion: whether the variable ordering of (Element_A, Element_B)
            carries an obligatory difference in semantic scope.
            y = scopal permutation (the two orders have different scope readings).
            n = free permutation (the two orders are semantically equivalent; the pair
                is freely permutable and excluded from flexible domains).
            An element appearing in one scopal=y pair and one scopal=n pair is treated
            as partially non-permutable.

  - name: free_occurrence
    description: >
      Tests which positions are free-occurrence-internal — i.e., which positions can
      be part of a span containing exactly one free form. A position is
      free-occurrence-internal if (a) it is to the left of the anchor (keystone) and
      left-edge-of-free-form=y, (b) to the right of the anchor and
      right-edge-of-free-form=y, or (c) dependent on the anchor via dependent-on-left
      or dependent-on-right. The maximal span runs from the leftmost to rightmost such
      position. The minimal span is the keystone alone (if free) or the positions the
      keystone depends on (if bound). Classified as indeterminate (Tallman et al. 2024)
      because free occurrence straddles morphosyntactic and phonological criteria.
    diagnostic_criteria:

      - name: free
        values: [y, n]
        description: >
          Whether the element is morphosyntactically free — i.e., it can occur as a
          standalone utterance independently of the verbal head, passing the minimal
          free form test. Bound elements (free=n) cannot occur independently.
          Pre-filled from noninterruption/general.tsv at sheet generation time.
          Annotate noninterruption before generating the free_occurrence sheet.
          integrity-check warns if the two sheets later drift (e.g. after a
          noninterruption edit). See issue #99.

      - name: left-edge-of-free-form
        values: [y, n]
        description: >
          Whether this element can be the first element in an utterance that is a
          single free form (i.e., the minimal free occurrence domain can begin here).
          Only asked for elements to the left of the keystone anchor. Bound elements
          (free=n) that cannot serve as the left edge of any free-form utterance
          receive n; free elements that can begin a standalone utterance receive y.

      - name: right-edge-of-free-form
        values: [y, n]
        description: >
          Whether this element can be the last element in an utterance that is a
          single free form (i.e., the minimal free occurrence domain can end here).
          Only asked for elements to the right of the keystone anchor. Bound elements
          (free=n) that cannot serve as the right edge of any free-form utterance
          receive n; free elements that can end a standalone utterance receive y.

      - name: dependent-on-left
        values: [na, "<position_number>"]
        description: >
          For bound elements (free=n) only: the position number to the LEFT of this
          element that this element must attach to in order to be realized. na for
          free elements or bound elements with no left dependency. Can reference up
          to one position (for elements that depend on two positions, use both
          dependent-on-left and dependent-on-right). Position numbers must match
          Position_Number values in the planar structure.
          [NEEDS REVIEW: position_ref type — not a fixed value set; validated by
          cross-referencing the planar structure.]

      - name: dependent-on-right
        values: [na, "<position_number>"]
        description: >
          For bound elements (free=n) only: the position number to the RIGHT of this
          element that this element must attach to in order to be realized. na for
          free elements or bound elements with no right dependency. Can reference up
          to one position (for elements that depend on two positions, use both
          dependent-on-left and dependent-on-right). Position numbers must match
          Position_Number values in the planar structure.
          [NEEDS REVIEW: position_ref type — not a fixed value set; validated by
          cross-referencing the planar structure.]

  # aspiration is retired as of issue #100 — now handled by segmental
  # (construction aspiration_prominence). Criteria moved to segmental section below.

  - name: biuniqueness
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) §Extended exponence. Verify before use.

      Tests for deviations from biuniqueness — spans defined by phenomena such as
      circumfixation (a morpheme discontinuous across positions) and extended
      exponence (the same morphosyntactic feature expressed by multiple morphs in
      different positions). The biuniqueness domain is the span from the leftmost
      piece of the extended exponent to the rightmost piece. Classified as an
      indeterminate domain (Tallman et al. 2024). Each circumfix or extended
      exponent group is annotated in its own TSV (one construction per file).
      In Araona: the negation circumfix (pi-…-ma) identifies a vpref–tamesuf
      domain; the interactional circumfix (ja-…-ti) identifies a vpref–ti domain.
    diagnostic_criteria:
      - name: biunique
        values: [y, n]
        description: >
          Whether the element participates in a biunique (one-form / one-meaning)
          relationship. y = the element is biunique (not part of an extended
          exponent). n = the element is one of the pieces of a circumfix or
          extended exponent set and therefore deviates from strict biuniqueness.

  - name: repair
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 2
      (Cup'ik) §Repair domain. Verify before use.

      Tests which span speakers restart from when they make a production error.
      The repair domain is the minimal span such that, when an error occurs at
      any position within it, the speaker returns to the left edge and restarts
      from there rather than resuming from the error point. In Cup'ik, the repair
      domain corresponds to the traditional Verb Word (vbase–pn4). Classified as
      a phonological domain type (Tallman et al. 2024, discussion ch. 17).
    diagnostic_criteria:
      - name: restart
        values: [y, n]
        description: >
          Whether this element's position is within the repair domain. y = an
          error at this position triggers restart from the domain's left edge.

  - name: pausing
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design was automatically derived from
      the description in Tallman et al. 2024 (langsci/291), Discussion ch. 17 only —
      no concrete language data was reviewed. Diagnostic criterion design is speculative.
      Verify thoroughly before use.

      Tests which spans are delimited by prosodic pause boundaries. The pausing
      domain is a span where elements cannot be separated by a prosodic pause —
      the span constitutes a pause unit. Positions outside the domain permit
      pause insertion. Classified as a phonological domain type (Tallman et al.
      2024, discussion ch. 17).
    diagnostic_criteria:
      - name: pause_domain
        values: [y, n]
        description: >
          Whether this element's position is within the pause domain. y = a
          pause cannot be inserted between this position and adjacent positions
          within the domain.

  - name: proform
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design was automatically derived from
      the description in Tallman et al. 2024 (langsci/291), Discussion ch. 17 only —
      no concrete language data was reviewed. Diagnostic criterion design is speculative.
      Verify thoroughly before use.

      Tests which spans can be replaced by a proform (pronoun, pro-verb, pro-VP,
      etc.). The proform domain is the span that the proform substitutes for.
      Classified as a morphosyntactic domain type (Tallman et al. 2024, discussion
      ch. 17).
    diagnostic_criteria:
      - name: substitutable
        values: [y, n]
        description: >
          Whether a proform can replace elements at this position — i.e., whether
          this position falls within the span the proform substitutes for.

  - name: play_language
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design was automatically derived from
      reading Tallman et al. 2024 (langsci/291), Discussion ch. 17 and a brief
      mention in ch. 8 (Chatino) — no complete language data section was reviewed.
      Diagnostic criterion design is speculative. Verify thoroughly before use.

      Tests which spans are targeted by play language (ludling) operations —
      e.g., infixation in pig-Latin-like games, reversal or permutation of
      elements within a span. The play language domain is the span within which
      the ludling operation applies. Currently attested in Zenzontepec Chatino
      (ch. 8). Classified as a phonological domain type (Tallman et al. 2024,
      discussion ch. 17).
    diagnostic_criteria:
      - name: applies
        values: [y, n]
        description: >
          Whether the play language operation targets this element's position.
          y = this position is within the domain of the ludling operation.

  - name: idiom
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design was automatically derived from
      the description in Tallman et al. 2024 (langsci/291), Discussion ch. 17 only —
      no concrete language data was reviewed. Diagnostic criterion design is speculative.
      Verify thoroughly before use.

      Tests which spans form idiomatic units — spans where the combination of
      elements has a meaning not predictable from the individual elements.
      The idiom domain is the span covered by the idiomatic unit. Classified
      as a morphosyntactic domain type (Tallman et al. 2024, discussion ch. 17).
    diagnostic_criteria:
      - name: idiomatic
        values: [y, n]
        description: >
          Whether this element participates in an idiomatic (non-compositional)
          combination. y = this element is part of an idiomatic unit.

  - name: segmental
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Diagnostic criterion design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) §Vowel syncope and ch. 2 (Cup'ik) §Segmental domains. Verify before use.

      Tests which span is governed by a segmental (non-prosodic) phonological process.
      Examples: vowel deletion/coalescence at position junctures (Araona: vowel syncope
      domain vcore–tamesuf), consonant coalescence (Cup'ik: uvular-velar coalescence
      domain vbase–pn4), nasality spreading, palatalization, aspiration. Each
      process is annotated in its own TSV (one construction per file). Multiple segmental
      processes in one language may identify different spans. Classified as a phonological
      domain type (Tallman et al. 2024, discussion ch. 17).
    diagnostic_criteria:
      - name: aspirated
        values: [y, n, both]
        description: >
          [NEEDS REVIEW] Whether the segmental phonological process applies to this
          element's position. y = this position is within the domain of the process.

  # suprasegmental is retired as of issue #100. Constructions redistributed to:
  #   metrical (stress_domain) — uses accented/obligatory/independence (blocked-span)
  #   tonosegmental (tone melody, superhigh-assignment) — uses applies
  #   tonal (H1-spreading, H3-assignment) — uses applies
  # See metrical and tonal/tonosegmental sections for criteria.

  - name: tonal
    description: >
      [AUTO-DERIVED] Tests which span is governed by a general tonal phonological
      process (spreading, assignment, sandhi) distinct from tonosegmental melody
      overlays. Examples: H1-spreading domain (Cherokee), H3-assignment domain
      (Cherokee). Each process is annotated in its own TSV.
    diagnostic_criteria:
      - name: applies
        values: [y, n]
        description: >
          Whether the tonal phonological process applies to this element's position.
          y = this position is within the domain of the tonal rule.

  - name: tonosegmental
    description: >
      [AUTO-DERIVED] Tests which span is governed by a tonal melody assigned to
      a segmental span as the surface realisation of a grammatical or semantic
      feature (e.g., Chatino TAM tone melodies, Cherokee superhigh-assignment).
      Each melody is annotated in its own TSV.
    diagnostic_criteria:
      - name: applies
        values: [y, n]
        description: >
          Whether the tonosegmental process applies to this element's position.
          y = this position is within the domain of the tonal melody assignment rule.

  - name: intonational
    description: >
      [AUTO-DERIVED] Tests which span is governed by an intonational phonological
      pattern (boundary tone, pitch reset, declination, etc.). Each pattern is
      annotated in its own TSV.
    diagnostic_criteria:
      - name: applies
        values: [y, n]
        description: >
          Whether the intonational pattern applies to this element's position.
          y = this position is within the intonational domain.

# ---------------------------------------------------------------------------
# SHARED CRITERION VALUES
# ---------------------------------------------------------------------------

# Machine-readable set of values always accepted by validate_coding.py,
# regardless of per-criterion allowed values.
default_allowed_values: [y, n, na, "?"]

shared_values:

  - value: "y"
    meaning: Yes — the criterion holds for this element in this construction.

  - value: "n"
    meaning: No — the criterion does not hold for this element in this construction.

  - value: "NA"
    meaning: >
      Not applicable — the criterion does not apply to this position or
      element in this language. A positive annotation act: the annotator has
      examined the position and determined that the criterion is linguistically
      inapplicable (e.g. a root that can only ever have one vowel in a harmony
      test, or the keystone position in a test where it does not participate).
      Distinct from blank (not yet examined) and from "?" (examined but
      answer indeterminate). NA positions are excluded from span computations.

  - value: "?"
    meaning: >
      Indeterminate — annotation was attempted but a definitive answer is not
      possible with currently available information. A positive annotation act,
      not an absence of annotation: the annotator has examined the position and
      found the evidence insufficient to decide. The answer may become
      resolvable as more data or analysis becomes available. Distinct from
      blank (not yet attempted) and from NA (criterion inapplicable). Treated
      as missing data; rows with "?" will cause validation warnings on import
      and are excluded from span computations.

  - value: ""
    meaning: >
      Blank — not yet attempted. The annotator has not yet examined this
      element for this criterion. Distinct from "?" (examined but
      indeterminate) and from NA (examined and inapplicable). Blank cells
      trigger a validation warning on import and are excluded from span
      computations. Do not use "?" as a substitute for a blank cell.
