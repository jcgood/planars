name: Data refresh

# Runs daily to pull fresh annotation data from Google Sheets, regenerate
# snapshots, and commit any changes to planars-data and planars.
#
# This keeps snapshots continuously anchored to current annotation data so
# that snapshot failures on a PR mean exactly one thing: an uncommitted code
# change altered span output. The pre-commit hook owns code → snapshot updates;
# this job owns data → snapshot updates.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   PLANARS_DATA_TOKEN        — PAT with read/write access to jcgood/planars-data
#   PLANARS_OAUTH_CREDENTIALS — contents of ~/.config/planars/oauth_credentials.json
#   GOOGLE_OAUTH_TOKEN        — contents of ~/.config/gspread/authorized_user.json
#
# drive_config.json is committed to the repo (no credentials, only Drive IDs)
# and is used directly — no secret needed.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC (before sheet-validation at 09:00)
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push snapshot changes to planars
      issues: write         # needed to file sheet-drift issues

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out planars-data
        uses: actions/checkout@v4
        with:
          repository: jcgood/planars-data
          token: ${{ secrets.PLANARS_DATA_TOKEN }}
          path: coded_data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        env:
          OAUTH_CREDS: ${{ secrets.PLANARS_OAUTH_CREDENTIALS }}
          OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.config/planars ~/.config/gspread
          printf '%s' "$OAUTH_CREDS" > ~/.config/planars/oauth_credentials.json
          printf '%s' "$OAUTH_TOKEN" > ~/.config/gspread/authorized_user.json

      - name: Record planars-data state before import
        # Gap 2 (#121): snapshot the planars-data HEAD and the set of files
        # touched by human (non-bot) commits since the last data-refresh run.
        # Used after the import to detect whether fresh Sheet data overwrote
        # work a coordinator committed directly to planars-data.
        id: pre_import
        working-directory: coded_data
        run: |
          echo "before_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          LAST_BOT=$(git log --format="%H %ae" | grep "github-actions\[bot\]" | head -1 | cut -d' ' -f1)
          if [ -n "$LAST_BOT" ]; then
            git diff --name-only "$LAST_BOT" HEAD > /tmp/human_committed_files.txt
          else
            git ls-files > /tmp/human_committed_files.txt
          fi
          echo "Human-committed files at risk of overwrite:"
          cat /tmp/human_committed_files.txt || echo "(none)"

      - name: Import annotation data from Google Sheets
        id: import_sheets
        run: python -m coding import-sheets --apply --ignore-status > /tmp/import_report.txt
        continue-on-error: true

      - name: Write import summary
        if: always()
        run: |
          echo "## Import — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/import_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: File or update GitHub issue if import failed
        if: steps.import_sheets.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh file import-error "Import error in data refresh ($(date -u +%Y-%m-%d))" /tmp/import_report.txt

      - name: Close open import-error issue if import succeeded
        if: steps.import_sheets.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close import-error "Import succeeded on $(date -u +%Y-%m-%d) — closing."

      - name: Remind if pending-changes issue is stale
        # If an open pending-changes issue has been open for more than 7 days,
        # add a daily comment to resurface it. Uses the GitHub issue creation
        # date — not pending_changes.json, which is gitignored and never present
        # in CI. The issue is the persistent record; the file is ephemeral.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALE=$(gh issue list --label pending-changes --state open \
            --json number,createdAt \
            --jq '[.[] | select((now - (.createdAt | fromdateiso8601)) > 604800)] | .[].number')
          for ISSUE_NUM in $STALE; do
            gh issue comment "$ISSUE_NUM" \
              --body "Reminder: this pending-changes issue has been open for more than 7 days as of $(date -u +%Y-%m-%d). Run \`python -m coding apply-pending\` to review and apply each change."
          done

      - name: Regenerate diagnostics TSVs from YAML
        # Keeps diagnostics_{lang_id}.tsv in sync with the YAML source of truth.
        # Catches cases where a coordinator edited the YAML locally but forgot to
        # run sync-diagnostics-yaml --apply before committing.
        run: python -m coding sync-diagnostics-yaml --apply
        continue-on-error: true

      - name: Push diagnostics YAML changes back to Google Sheets
        # Keeps the diagnostics Google Sheet in sync with the YAML source of truth.
        # Prevents false-alarm diagnostics-drift issues caused by stale Sheet content
        # (e.g. old class names after a rename). See issue #125.
        run: python -m coding sync-diagnostics-yaml --to-sheet --apply
        continue-on-error: true

      - name: Sync criterion columns to annotation sheets
        # Issue #120: adds missing criterion columns and updates dropdown validation
        # for any new criteria added to diagnostics_{lang}.yaml since the last run.
        # Safe to automate: --apply without destructive flags (--rename/--remove/
        # --split/--merge) is additive-only and idempotent.
        run: python -m coding sync-params --apply
        continue-on-error: true

      - name: Check for diagnostics YAML drift
        id: diag_drift
        run: |
          if [ -f diagnostics_drift.json ]; then
            COUNT=$(python -c "import json; d=json.load(open('diagnostics_drift.json')); print(len(d))")
            if [ "$COUNT" -gt 0 ]; then
              echo "drift=true" >> $GITHUB_OUTPUT
            else
              echo "drift=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

      - name: File or update GitHub issue if diagnostics drift detected
        if: steps.diag_drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY_FILE=$(mktemp)
          echo "## Diagnostics YAML drift detected — $(date -u +%Y-%m-%d)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "The daily data refresh found ambiguous differences between a diagnostics TSV" >> "$BODY_FILE"
          echo "(downloaded from Google Sheets) and the corresponding YAML source of truth." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "**Ambiguous changes require coordinator review** before they can be applied." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "To resolve:" >> "$BODY_FILE"
          echo "1. Pull latest \`coded_data/\` and run \`python -m coding sync-diagnostics-yaml --from-tsv\` (dry run)" >> "$BODY_FILE"
          echo "2. Review the output and edit the YAML directly for any ambiguous items" >> "$BODY_FILE"
          echo "3. Run \`python -m coding sync-diagnostics-yaml --apply\` to regenerate the TSV from the corrected YAML" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Drift details" >> "$BODY_FILE"
          echo '```json' >> "$BODY_FILE"
          cat diagnostics_drift.json >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"
          bash .github/scripts/manage_issue.sh file diagnostics-drift "Diagnostics YAML drift detected ($(date -u +%Y-%m-%d))" "$BODY_FILE"
          rm -f "$BODY_FILE"

      - name: Close open diagnostics drift issue if all clear
        if: steps.diag_drift.outputs.drift == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close diagnostics-drift "Diagnostics YAML drift resolved on $(date -u +%Y-%m-%d) — closing."

      - name: Check codebook consistency
        # Gap 1 (#121): catches schema inconsistencies (criteria in modules but
        # not in diagnostic_criteria.yaml, required criteria missing from
        # diagnostics_{lang}.tsv, etc.) that can arise from data changes as well
        # as code changes. CI covers the code-change path; this covers the
        # data-change path (e.g. new class added to diagnostics TSV via sheets).
        id: codebook
        run: python -m coding check-codebook > /tmp/codebook_report.txt
        continue-on-error: true

      - name: Generate rule-update prompts for stale hashes
        if: steps.codebook.outcome == 'failure'
        run: python -m coding generate-rule-update-prompt > /tmp/rule_update_prompts.txt
        continue-on-error: true

      - name: File or update GitHub issue if codebook check failed
        if: steps.codebook.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY_FILE=$(mktemp)
          cat /tmp/codebook_report.txt >> "$BODY_FILE"
          if [ -s /tmp/rule_update_prompts.txt ]; then
            printf '\n---\n\n## Ready-to-paste Claude prompts\n\n' >> "$BODY_FILE"
            cat /tmp/rule_update_prompts.txt >> "$BODY_FILE"
          fi
          bash .github/scripts/manage_issue.sh file codebook-error "Codebook inconsistency detected ($(date -u +%Y-%m-%d))" "$BODY_FILE"
          rm -f "$BODY_FILE"

      - name: Close open codebook-error issue if all clear
        if: steps.codebook.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close codebook-error "Codebook check passed on $(date -u +%Y-%m-%d) — closing."

      - name: Check for stale manifest entries
        # Flags manifest classes that are no longer in diagnostics_{lang}.yaml.
        # Fast: reads local YAML files only, no Sheet API calls.
        # Tells the coordinator to run prune-manifest before data-refresh keeps
        # re-importing retired sheets indefinitely.
        id: stale_manifest
        run: python -m coding integrity-check --check-manifest > /tmp/stale_manifest.txt
        continue-on-error: true

      - name: File or update GitHub issue if stale manifest entries found
        if: steps.stale_manifest.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh file stale-manifest "Stale manifest entries detected ($(date -u +%Y-%m-%d))" /tmp/stale_manifest.txt

      - name: Close open stale-manifest issue if all clear
        if: steps.stale_manifest.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close stale-manifest "Stale manifest entries resolved on $(date -u +%Y-%m-%d) — closing."

      - name: Run integrity check
        # Validates planar TSV structure and analysis module consistency —
        # things that can break due to data changes, not just code changes.
        # Complements check-codebook (which focuses on schema consistency).
        id: integrity
        run: python -m coding integrity-check > /tmp/integrity_report.txt
        continue-on-error: true

      - name: File or update GitHub issue if integrity check failed
        if: steps.integrity.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh file integrity-error "Integrity check failed ($(date -u +%Y-%m-%d))" /tmp/integrity_report.txt

      - name: Close open integrity-error issue if all clear
        if: steps.integrity.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close integrity-error "Integrity check passed on $(date -u +%Y-%m-%d) — closing."

      - name: Regenerate snapshots
        # Gap 4 (#121): if: always() ensures snapshots are regenerated even when
        # earlier steps failed (e.g. import-sheets crash). coded_data/ is always
        # populated by the checkout step so generation is safe to run regardless.
        if: always()
        run: python generate_snapshots.py

      - name: Commit and push planars-data changes
        working-directory: coded_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No annotation data changes."
          else
            git commit -m "data: daily annotation refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Check for coordinator data overwritten by refresh
        # Gap 2 (#121): intersect human-committed files (recorded pre-import)
        # with files changed by today's import. An intersection means the
        # coordinator's direct planars-data commits may have been overwritten.
        id: overwrite_check
        if: always()
        working-directory: coded_data
        run: |
          touch /tmp/human_committed_files.txt
          BEFORE="${{ steps.pre_import.outputs.before_sha }}"
          AFTER=$(git rev-parse HEAD)
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$AFTER" ]; then
            echo "No planars-data changes — skipping overwrite check."
            echo "overwrite=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git diff --name-only "$BEFORE" "$AFTER" > /tmp/refresh_changed_files.txt
          comm -12 <(sort /tmp/human_committed_files.txt) <(sort /tmp/refresh_changed_files.txt) > /tmp/overwritten_files.txt
          if [ -s /tmp/overwritten_files.txt ]; then
            echo "overwrite=true" >> $GITHUB_OUTPUT
            echo "Potentially overwritten files:"
            cat /tmp/overwritten_files.txt
          else
            echo "overwrite=false" >> $GITHUB_OUTPUT
            echo "No coordinator files overwritten."
          fi

      - name: File or update GitHub issue if coordinator data overwritten
        if: steps.overwrite_check.outputs.overwrite == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY_FILE=$(mktemp)
          echo "## Coordinator data may have been overwritten — $(date -u +%Y-%m-%d)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "The daily data refresh detected human commits to planars-data that were" >> "$BODY_FILE"
          echo "overwritten by today's import from Google Sheets." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "This may be a false alarm if the coordinator's local edit matched the Sheet." >> "$BODY_FILE"
          echo "But if the Sheet was stale (e.g. after a column rename), annotation data may be lost." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "**Check git history in planars-data to verify. Use \`git log\` and \`git show\`** on the commit(s) listed below, then compare against the current TSV." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Files affected" >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"
          cat /tmp/overwritten_files.txt >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"
          bash .github/scripts/manage_issue.sh file data-overwrite "Coordinator data may have been overwritten by data-refresh ($(date -u +%Y-%m-%d))" "$BODY_FILE"
          rm -f "$BODY_FILE"

      - name: Close open data-overwrite issue if all clear
        if: steps.overwrite_check.outputs.overwrite == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close data-overwrite "No coordinator data overwritten on $(date -u +%Y-%m-%d) — closing."

      - name: Commit and push planars snapshot changes
        # Gap 4 (#121): if: always() ensures snapshots are committed even when
        # earlier steps failed, preventing stale-snapshot CI failures on the
        # next code push.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "snapshots: regenerate from daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Apply additive sheet updates
        # Gap 3 (#121): auto-apply new planar elements and missing trailing
        # columns to existing annotation sheets. This is additive and safe —
        # same reasoning as sync-params --apply (#120). The dry-run drift check
        # below then confirms whether anything non-additive still needs attention.
        run: python -m coding update-sheets --apply
        continue-on-error: true

      - name: Check for sheet drift
        id: drift
        run: |
          touch /tmp/sheet_drift.txt
          python -m coding update-sheets > /tmp/sheet_drift.txt 2>&1
        continue-on-error: true

      - name: Write drift summary
        if: always()
        run: |
          echo "## Sheet drift check — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/sheet_drift.txt ]; then
            cat /tmp/sheet_drift.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "(drift check did not run)" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: File or update GitHub issue if drift detected
        if: steps.drift.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh file sheet-drift "Sheet drift detected — update-sheets --apply needs review ($(date -u +%Y-%m-%d))" /tmp/sheet_drift.txt

      - name: Close open drift issue if all clear
        if: steps.drift.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/manage_issue.sh close sheet-drift "Sheet drift resolved on $(date -u +%Y-%m-%d) — closing."

      - name: Annotation scope summary
        # Informational: count languages, classes, and constructions from
        # diagnostics YAMLs so the step summary gives a quick project-wide picture.
        if: always()
        run: |
          LANGS=$(find coded_data -maxdepth 1 -mindepth 1 -type d -not -name ".*" | wc -l | tr -d ' ')
          YAMLS=$(find coded_data -name "diagnostics_*.yaml" | wc -l | tr -d ' ')
          TSVS=$(find coded_data -name "*.tsv" -not -path "*/archive/*" -not -path "*/planar_input/*" | wc -l | tr -d ' ')
          echo "## Annotation scope — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "${LANGS} language(s) · ${YAMLS} with diagnostics YAML · ${TSVS} filled construction TSV(s)" >> $GITHUB_STEP_SUMMARY
