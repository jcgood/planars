name: Data refresh

# Runs daily to pull fresh annotation data from Google Sheets, regenerate
# snapshots, and commit any changes to planars-data and planars.
#
# This keeps snapshots continuously anchored to current annotation data so
# that snapshot failures on a PR mean exactly one thing: an uncommitted code
# change altered span output. The pre-commit hook owns code → snapshot updates;
# this job owns data → snapshot updates.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   PLANARS_DATA_TOKEN        — PAT with read/write access to jcgood/planars-data
#   PLANARS_OAUTH_CREDENTIALS — contents of ~/.config/planars/oauth_credentials.json
#   GOOGLE_OAUTH_TOKEN        — contents of ~/.config/gspread/authorized_user.json
#
# drive_config.json is committed to the repo (no credentials, only Drive IDs)
# and is used directly — no secret needed.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC (before sheet-validation at 09:00)
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push snapshot changes to planars
      issues: write         # needed to file sheet-drift issues

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out planars-data
        uses: actions/checkout@v4
        with:
          repository: jcgood/planars-data
          token: ${{ secrets.PLANARS_DATA_TOKEN }}
          path: coded_data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        env:
          OAUTH_CREDS: ${{ secrets.PLANARS_OAUTH_CREDENTIALS }}
          OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.config/planars ~/.config/gspread
          printf '%s' "$OAUTH_CREDS" > ~/.config/planars/oauth_credentials.json
          printf '%s' "$OAUTH_TOKEN" > ~/.config/gspread/authorized_user.json

      - name: Import annotation data from Google Sheets
        id: import_sheets
        run: python -m coding import-sheets --apply --ignore-status > /tmp/import_report.txt
        continue-on-error: true

      - name: Write import summary
        if: always()
        run: |
          echo "## Import — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/import_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: File or update GitHub issue if import failed
        if: steps.import_sheets.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label import-error --state open --json number --jq length)
          if [ "$OPEN_COUNT" -eq 0 ]; then
            gh issue create \
              --title "Import error in data refresh ($(date -u +%Y-%m-%d))" \
              --label import-error \
              --body-file /tmp/import_report.txt
          else
            ISSUE_NUM=$(gh issue list --label import-error --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body-file /tmp/import_report.txt
          fi

      - name: Close open import-error issue if import succeeded
        if: steps.import_sheets.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label import-error --state open --json number --jq length)
          if [ "$OPEN_COUNT" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --label import-error --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body "Import succeeded on $(date -u +%Y-%m-%d) — closing."
            gh issue close "$ISSUE_NUM"
          fi

      - name: Regenerate diagnostics TSVs from YAML
        # Keeps diagnostics_{lang_id}.tsv in sync with the YAML source of truth.
        # Catches cases where a coordinator edited the YAML locally but forgot to
        # run sync-diagnostics-yaml --apply before committing.
        run: python -m coding sync-diagnostics-yaml --apply

      - name: Push diagnostics YAML changes back to Google Sheets
        # Keeps the diagnostics Google Sheet in sync with the YAML source of truth.
        # Prevents false-alarm diagnostics-drift issues caused by stale Sheet content
        # (e.g. old class names after a rename). See issue #125.
        run: python -m coding sync-diagnostics-yaml --to-sheet --apply

      - name: Check for diagnostics YAML drift
        id: diag_drift
        run: |
          if [ -f diagnostics_drift.json ]; then
            COUNT=$(python -c "import json; d=json.load(open('diagnostics_drift.json')); print(len(d))")
            if [ "$COUNT" -gt 0 ]; then
              echo "drift=true" >> $GITHUB_OUTPUT
            else
              echo "drift=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

      - name: File or update GitHub issue if diagnostics drift detected
        if: steps.diag_drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY_FILE=$(mktemp)
          echo "## Diagnostics YAML drift detected — $(date -u +%Y-%m-%d)" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "The daily data refresh found ambiguous differences between a diagnostics TSV" >> "$BODY_FILE"
          echo "(downloaded from Google Sheets) and the corresponding YAML source of truth." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "**Ambiguous changes require coordinator review** before they can be applied." >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "To resolve:" >> "$BODY_FILE"
          echo "1. Pull latest \`coded_data/\` and run \`python -m coding sync-diagnostics-yaml --from-tsv\` (dry run)" >> "$BODY_FILE"
          echo "2. Review the output and edit the YAML directly for any ambiguous items" >> "$BODY_FILE"
          echo "3. Run \`python -m coding sync-diagnostics-yaml --apply\` to regenerate the TSV from the corrected YAML" >> "$BODY_FILE"
          echo "" >> "$BODY_FILE"
          echo "### Drift details" >> "$BODY_FILE"
          echo '```json' >> "$BODY_FILE"
          cat diagnostics_drift.json >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"
          OPEN_COUNT=$(gh issue list --label diagnostics-drift --state open --json number --jq length)
          if [ "$OPEN_COUNT" -eq 0 ]; then
            gh issue create \
              --title "Diagnostics YAML drift detected ($(date -u +%Y-%m-%d))" \
              --label diagnostics-drift \
              --body-file "$BODY_FILE"
          else
            ISSUE_NUM=$(gh issue list --label diagnostics-drift --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body-file "$BODY_FILE"
          fi
          rm -f "$BODY_FILE"

      - name: Close open diagnostics drift issue if all clear
        if: steps.diag_drift.outputs.drift == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label diagnostics-drift --state open --json number --jq length)
          if [ "$OPEN_COUNT" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --label diagnostics-drift --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body "Diagnostics YAML drift resolved on $(date -u +%Y-%m-%d) — closing."
            gh issue close "$ISSUE_NUM"
          fi

      - name: Regenerate snapshots
        run: python generate_snapshots.py

      - name: Commit and push planars-data changes
        working-directory: coded_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No annotation data changes."
          else
            git commit -m "data: daily annotation refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Commit and push planars snapshot changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/snapshots/
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "snapshots: regenerate from daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Check for sheet drift
        id: drift
        run: |
          touch /tmp/sheet_drift.txt
          python -m coding update-sheets > /tmp/sheet_drift.txt 2>&1
        continue-on-error: true

      - name: Write drift summary
        if: always()
        run: |
          echo "## Sheet drift check — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/sheet_drift.txt ]; then
            cat /tmp/sheet_drift.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "(drift check did not run)" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: File or update GitHub issue if drift detected
        if: steps.drift.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label sheet-drift --state open --json number --jq length)
          if [ "$OPEN_COUNT" -eq 0 ]; then
            gh issue create \
              --title "Sheet drift detected — run update-sheets --apply ($(date -u +%Y-%m-%d))" \
              --label sheet-drift \
              --body-file /tmp/sheet_drift.txt
          else
            ISSUE_NUM=$(gh issue list --label sheet-drift --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body-file /tmp/sheet_drift.txt
          fi

      - name: Close open drift issue if all clear
        if: steps.drift.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label sheet-drift --state open --json number --jq length)
          if [ "$OPEN_COUNT" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --label sheet-drift --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body "Sheet drift resolved on $(date -u +%Y-%m-%d) — closing."
            gh issue close "$ISSUE_NUM"
          fi
