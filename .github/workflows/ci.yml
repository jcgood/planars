name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check out planars-data
        uses: actions/checkout@v4
        with:
          repository: jcgood/planars-data
          token: ${{ secrets.PLANARS_DATA_TOKEN }}
          path: _planars_data

      - name: Merge annotation data into coded_data
        run: rsync -r --exclude='.git' _planars_data/ coded_data/

      - name: Remove legacy _filled.tsv filenames
        run: find coded_data -name "*_filled.tsv" -delete

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check snapshots are up to date
        run: python check_snapshots.py

      - name: Run tests
        run: pytest
