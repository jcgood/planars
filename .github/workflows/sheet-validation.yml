name: Sheet validation

# Runs daily to detect unauthorized or accidental edits to annotation sheets.
# On failure: creates a GitHub issue (or comments on an existing open one).
# On success after failure: closes the open issue automatically.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   PLANARS_DATA_TOKEN       — PAT with read access to jcgood/planars-data
#   PLANARS_OAUTH_CREDENTIALS — contents of ~/.config/planars/oauth_credentials.json
#   GOOGLE_OAUTH_TOKEN       — contents of ~/.config/gspread/authorized_user.json
#
# drive_config.json is committed to the repo (no credentials, only Drive IDs)
# and is used directly — no secret needed.

on:
  schedule:
    - cron: '0 9 * * *'   # daily at 09:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check out planars-data
        uses: actions/checkout@v4
        with:
          repository: jcgood/planars-data
          token: ${{ secrets.PLANARS_DATA_TOKEN }}
          path: _planars_data

      - name: Merge annotation data into coded_data
        run: rsync -r --exclude='.git' _planars_data/ coded_data/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        env:
          OAUTH_CREDS: ${{ secrets.PLANARS_OAUTH_CREDENTIALS }}
          OAUTH_TOKEN: ${{ secrets.GOOGLE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.config/planars ~/.config/gspread
          printf '%s' "$OAUTH_CREDS" > ~/.config/planars/oauth_credentials.json
          printf '%s' "$OAUTH_TOKEN" > ~/.config/gspread/authorized_user.json

      - name: Run validate-coding
        id: validate
        run: python -m coding validate-coding > /tmp/report.txt 2>&1
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          echo "## Sheet validation — $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build structured issue body for sheet validation
        if: steps.validate.outcome == 'failure'
        run: |
          python3 << 'PYEOF'
          import re
          text = open('/tmp/report.txt').read()
          lines = text.splitlines()
          errors = []
          current_lang = None
          current_class = None
          for line in lines:
              # Language header: Glottocode pattern (4 letters + 4 digits)
              if re.match(r'^[a-z]{4}\d{4}$', line.strip()):
                  current_lang = line.strip()
                  current_class = None
              # Planar / diagnostics validation sections
              elif re.match(r'^\s{2}Planar validation \(\d+ issue', line):
                  current_class = 'planar'
              elif re.match(r'^\s{2}Diagnostics validation \(\d+ issue', line):
                  current_class = 'diagnostics'
              # Sheet class/construction with issues
              elif m := re.match(r'^\s{2}\[(\S+/\S+)\] \d+ issue', line):
                  current_class = m.group(1)
              # ERROR or WARNING detail line (both are blocking issues)
              elif m := re.match(r'^\s{4}\[(ERROR|WARNING)\] .+?: (.+)', line):
                  if current_lang and current_class:
                      errors.append(f"- **{current_lang}** / {current_class}: {m.group(2)}")
          with open('/tmp/issue_body.md', 'w') as f:
              f.write("## What's wrong\n\n")
              if errors:
                  f.write('\n'.join(errors[:20]) + '\n')
                  if len(errors) > 20:
                      f.write(f"\n_…and {len(errors) - 20} more — see full log._\n")
              else:
                  f.write("_(Error details could not be extracted — see full log.)_\n")
              f.write("\n## What to do\n\n")
              f.write(
                  "Open the affected sheet, find the highlighted pink cells, "
                  "and correct the values to one of the allowed options listed above. "
                  "The issue closes automatically when the next validation run passes.\n"
              )
              f.write("\n## Full log\n\n")
              f.write("<details><summary>Show full validation output</summary>\n\n```\n")
              f.write(text)
              f.write("\n```\n\n</details>\n")
          PYEOF

      - name: File or update GitHub issue if issues found
        if: steps.validate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label sheet-validation --state open --json number --jq length)
          if [ "$OPEN_COUNT" -eq 0 ]; then
            gh issue create \
              --title "Sheet validation issues detected $(date -u +%Y-%m-%d)" \
              --label sheet-validation \
              --body-file /tmp/issue_body.md
          else
            ISSUE_NUM=$(gh issue list --label sheet-validation --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body-file /tmp/issue_body.md
          fi

      - name: Close open validation issue if all clear
        if: steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_COUNT=$(gh issue list --label sheet-validation --state open --json number --jq length)
          if [ "$OPEN_COUNT" -gt 0 ]; then
            ISSUE_NUM=$(gh issue list --label sheet-validation --state open --json number --jq '.[0].number')
            gh issue comment "$ISSUE_NUM" --body "Sheet validation passed on $(date -u +%Y-%m-%d) — closing."
            gh issue close "$ISSUE_NUM"
          fi
