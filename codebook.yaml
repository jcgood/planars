# Planars Codebook
# Source of truth for parameters, values, and analytical terms.
# Definitions draw on the theoretical framework in:
# Tallman, Auderset & Uchihara (eds.) (2024), "Constituency and convergence in the Americas",
# Topics in Phonological Diversity 1, Language Science Press. doi:10.5281/zenodo.10559861
# but this toolkit reflects ongoing research that extends beyond that work.
# Edit definitions directly here; a rendering script will be added to produce human-readable output.

# ---------------------------------------------------------------------------
# STRUCTURAL COLUMNS
# Present in every filled TSV.
# ---------------------------------------------------------------------------

structural_columns:

  - name: Element
    description: >
      A terminal component of a planar structure: a morph, another planar structure,
      or a well-defined subspan of a planar structure. Elements occupy positions.
      Elements with leading or trailing hyphens are wrapped in brackets (e.g. [-ed])
      to prevent misinterpretation by spreadsheet software.

  - name: Position_Name
    description: >
      The label for the position in the planar structure. Positions in the verbal
      domain are prefixed with "v:". The special value "v:verbroot" marks the
      keystone position (see Terms).

  - name: Position_Number
    description: >
      Integer index of the position in the planar structure. Lower numbers are
      further left; higher numbers are further right. The keystone (v:verbroot)
      anchors all span computations.

# ---------------------------------------------------------------------------
# PARAMETERS BY ANALYSIS
# ---------------------------------------------------------------------------

analyses:

  - name: ciscategorial
    description: >
      Tests which elements in the planar structure combine with only one part-of-speech
      category (ciscategorial selection). A ciscategorial domain is a contiguous subspan
      of positions whose elements can semantically combine with only one category class
      (V, N, or A). Elements that combine with multiple categories are transcategorial.
    parameters:

      - name: V-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a verbal head (verb root).
          An element that combines only with V (V-combines=y, N-combines=n, A-combines=n)
          is v-ciscategorial.

      - name: N-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a nominal head (noun root).

      - name: A-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with an adjectival head.

    qualification_rule: >
      An element is v-ciscategorial if V-combines=y AND N-combines=n AND A-combines=n
      (and any further combine parameters are also n).
      A position is complete if ALL its elements are v-ciscategorial.
      A position is partial if AT LEAST ONE element is v-ciscategorial.

  - name: subspanrepetition
    description: >
      Tests which positions participate in subspan repetition — a construction in which
      a contiguous subspan of the planar structure occurs more than once (e.g. coordination,
      complementation, serial verb constructions). Fractured by scope (widescope vs.
      narrowscope) and fillability.
    parameters:

      - name: widescope_left
        values: [y, n]
        description: >
          Whether the element takes wide scope to the left in a subspan repetition
          construction — i.e., it appears in one conjunct but has semantic scope over
          multiple conjoined spans to its left. Elements with wide scope are outside
          the minimal (narrowscope) subspan repetition domain.

      - name: widescope_right
        values: [y, n]
        description: >
          Whether the element takes wide scope to the right in a subspan repetition
          construction. See widescope_left.

      - name: fillable_botheither_conjunct
        values: [y, n]
        description: >
          [PLACEHOLDER] Whether the element is fillable in both conjuncts, either
          conjunct, or a single conjunct of the subspan repetition construction.

    qualification_rule: >
      Five span categories are derived:
        maximum_fillable:          fillable_botheither_conjunct=y
        maximum_widescope_left:    widescope_left=y
        maximum_widescope_right:   widescope_right=y
        maximum_narrowscope_left:  widescope_left=n  (element lacks wide scope left)
        maximum_narrowscope_right: widescope_right=n (element lacks wide scope right)
      Each category produces complete and partial position sets and four spans
      (strict/loose x complete/partial).

  - name: noninterruption
    description: >
      Tests morphosyntactic non-interruption: a span that cannot be interrupted by
      free or multiply-occurring free elements. Two domain types are derived based
      on what counts as an interruptor.
    parameters:

      - name: free
        values: [y, n]
        description: >
          Whether the element is morphosyntactically free — i.e., it can occur as a
          standalone utterance independently of the verbal head. Bound elements (free=n)
          cannot occur independently.

      - name: multiple
        values: [y, n]
        description: >
          Whether the element can occur more than once within the domain (multiply-occurring).
          Only meaningful when free=y. A singly-occurring free element (free=y, multiple=n)
          does not interrupt the single-free domain.

    qualification_rule: >
      Two domain types, each with complete and partial position sets:
        no-free domain:     element qualifies if free=n (bound).
        single-free domain: element qualifies if free=n OR (free=y AND multiple=n).
      Only strict spans are computed for non-interruption (no loose span).

  - name: stress
    description: >
      Tests which positions fall within the prosodic stress domain of the verbal
      keystone. Two domain types are derived based on different notions of
      stress domain boundary. Parameters capture whether elements can bear stress,
      whether stress is obligatory, whether an element's stress is independent of
      neighboring elements, and whether there are leftward or rightward stress
      interactions (see issues #16, #17 for meso and interaction domains).
    parameters:

      - name: stressed
        values: [y, n, both]
        description: >
          Whether the element can carry primary stress.
          y = always stressed; n = never stressed; both = variably stressed
          depending on context.

      - name: obligatory
        values: [y, n]
        description: >
          Whether stress is obligatory on this element (i.e., the element must
          bear stress when present). This is designed to handle situations where an intervening element
          may require stress (e.g., a Full NP argument) which would block the prosodic integration of a
          some element with the keystone's domain (e.g., a verbal particle). Contrastive example: "[picked up] the ball"
          versus "[pick] the ball [up]".

      - name: independence
        values: [y, n]
        description: >
          Whether the element's stress is independent of the keystone. This can be operationalized as: Can this element 
          be stressed when the keystone is also stressed.

      - name: left-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW — see issue #17] Whether the element's stress interacts
          with elements in the planar position directly to its left.

      - name: right-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW — see issue #17] Whether the element's stress interacts
          with elements directly to its right.

    qualification_rule: >
      Two broad domain types, each producing a single span, along with subtypes
      corresponding to a complete/partial
      distinction. Both use blocked_span: expand from ROOT in each direction,
      stopping just before the first position where the blocking condition holds
      for any element. The blocking position is excluded. The keystone (v:verbroot)
      must always be part of the domain for this test, and it also participates in blocking checks — its parameter values can trigger a domain
      boundary. Unlike other blocking elements, it is always part of the domain. That is, other blocking elements
      help determine domain boundaries, while the keystone is always within the domain, since we are looking
      for the stress domain around the head of the clause. While the test can be used to find some
      stress domains that do not involve the keystone, those are not considered in this analysis
      since we are focused on the stress domain involving the keystone only.

      Minimal stress domain — blocked by: stressable ∈ {y, both} (i.e., the value of stressable
      is either "y" or "both") AND independence = y.
        An independently-stressable element begins a new stress domain; the minimal
        domain ends just before it.

      Maximal stress domain — blocked by: obligatory = y AND independence = y.
        An obligatorily-independent stress element creates a hard boundary; the
        maximal domain extends up to but not including that position.

  - name: aspiration
    description: >
      [NEEDS REVIEW] Tests which positions fall within the aspiration domain of
      the verbal planar structure. Shares parameter structure with stress.
    parameters:

      - name: stressable
        values: [y, n, both]
        description: >
          [NEEDS REVIEW] Whether the element can carry aspiration. Reuses the
          stressable parameter name from the stress analysis; values have the
          same interpretation in the context of aspiration.

      - name: obligatory
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether aspiration is obligatory on this element.

      - name: independence
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether the element's aspiration is independent of
          neighboring elements.

      - name: left-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether the element's aspiration interacts with elements
          to its left.

      - name: right-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether the element's aspiration interacts with elements
          to its right.

    qualification_rule: >
      Mirrors the stress domain logic. Two domain types (minimal, maximal) using
      blocked_span with the same blocking conditions as stress. The keystone
      participates in blocking checks (same as stress). If aspiration requires
      different domain logic once data is collected, update this entry and
      aspiration.py accordingly.

# ---------------------------------------------------------------------------
# SHARED PARAMETER VALUES
# ---------------------------------------------------------------------------

shared_values:

  - value: "y"
    meaning: Yes — the parameter holds for this element in this construction.

  - value: "n"
    meaning: No — the parameter does not hold for this element in this construction.

  - value: "NA"
    meaning: >
      Not applicable. Used only for keystone rows (v:verbroot), which are
      excluded from all span computations.

  - value: "?"
    meaning: >
      Unknown or not yet annotated. Treated as missing data; rows with "?"
      will cause validation errors if passed to an analysis function.

# ---------------------------------------------------------------------------
# TERMS
# ---------------------------------------------------------------------------

terms:

  - term: planar structure
    definition: >
      A maximally flat hypothesis space for coding the results of constituency tests.
      Contains an ordered sequence of positions fit out by elements, scoping over a
      whole sentence without regard to orthographic word boundaries. Languages have
      a separate planar structure for each part-of-speech distinction (verbal, nominal,
      adjectival, etc.).

  - term: position
    definition: >
      A non-terminal slot in the planar structure. Positions are of two types:
      slots (where only one element can occur at a time) and zones (where multiple
      elements can occur in any order). Each position has a name and an integer index.

  - term: element
    definition: >
      A terminal component that fills a position: a morph, another planar structure,
      or a well-defined subspan of a planar structure. Multiple elements can occupy
      the same position; each is annotated independently.

  - term: keystone
    definition: >
      The semantic head of the planar structure — in a verbal planar structure, the
      verb root. Identified by Position_Name == "v:verbroot". Every planar structure
      has exactly one keystone position. It anchors all span computations but is
      excluded from qualification tests.

  - term: partial position
    definition: >
      A position in which AT LEAST ONE element satisfies the qualification rule
      for a given analysis. Partial positions define the widest possible span
      under that analysis.

  - term: complete position
    definition: >
      A position in which ALL elements satisfy the qualification rule for a given
      analysis. Complete positions define a more conservative span.

  - term: strict span
    definition: >
      The contiguous range of qualifying positions anchored at the keystone.
      Expansion stops at the first gap (non-qualifying position) on either side.
      Analogous to a minimal domain derived by positive evidence only.

  - term: loose span
    definition: >
      The range from the farthest qualifying position on the left to the farthest
      on the right of the keystone, regardless of intervening gaps. Always >= the
      strict span. Analogous to a maximal domain.

  - term: ciscategorial
    definition: >
      Describes an element or position that combines with only one part-of-speech
      category (V, N, or A). Contrasts with transcategorial, which applies to
      elements that can combine with multiple categories.

  - term: transcategorial
    definition: >
      Describes an element that can semantically combine with more than one
      part-of-speech category. Transcategorial elements are excluded from
      ciscategorial domains.

  - term: subspan repetition
    definition: >
      A construction in which a contiguous subspan of the planar structure occurs
      more than once (e.g. coordination, complementation, serial verb constructions).
      Fractured into minimal (narrowscope) and maximal (widescope) versions.

  - term: wide scope
    definition: >
      A property of an element in a subspan repetition construction whereby the
      element appears in one conjunct but has semantic scope over multiple conjoined
      spans. Wide-scope elements are outside the minimal subspan repetition domain.

  - term: narrow scope
    definition: >
      A property of an element confined to a single conjunct in a subspan repetition
      construction, with no scope over repeated spans. Narrowscope elements define
      the minimal subspan repetition domain.

  - term: non-interruption domain
    definition: >
      A span that cannot be interrupted by a free or multiply-occurring free element.
      Two versions are distinguished: the no-free domain (interrupted only by bound
      elements) and the single-free domain (allows singly-occurring free elements).

# ---------------------------------------------------------------------------
# CHART LABEL GLOSSARY
# Short labels used in domain_chart() output (planars/charts.py).
# These are subject to revision pending input from collaborators.
# ---------------------------------------------------------------------------

chart_labels:

  ciscategorial:
    - label: "cisc strict complete"
      meaning: Strict span over complete positions for the v-ciscategorial analysis.
    - label: "cisc loose complete"
      meaning: Loose span over complete positions for the v-ciscategorial analysis.
    - label: "cisc strict partial"
      meaning: Strict span over partial positions for the v-ciscategorial analysis.
    - label: "cisc loose partial"
      meaning: Loose span over partial positions for the v-ciscategorial analysis.

  subspanrepetition:
    prefixes:
      fill:  maximum_fillable — positions where fillable_botheither_conjunct=y
      ws-L:  maximum_widescope_left — positions where widescope_left=y
      ws-R:  maximum_widescope_right — positions where widescope_right=y
      ns-L:  maximum_narrowscope_left — positions where widescope_left=n
      ns-R:  maximum_narrowscope_right — positions where widescope_right=n
    suffixes:
      "strict complete": Strict span over complete positions.
      "loose complete":  Loose span over complete positions.
      "strict partial":  Strict span over partial positions.
      "loose partial":   Loose span over partial positions.
    note: >
      Labels are formed by combining a prefix and a suffix, e.g. "fill strict complete",
      "ws-L loose partial". This yields 20 labels (5 prefixes × 4 suffixes).

  noninterruption:
    - label: "no-free complete"
      meaning: Strict span over complete positions for the no-free domain (free=n).
    - label: "no-free partial"
      meaning: Strict span over partial positions for the no-free domain (free=n).
    - label: "1-free complete"
      meaning: >
        Strict span over complete positions for the single-free domain
        (free=n OR (free=y AND multiple=n)).
    - label: "1-free partial"
      meaning: >
        Strict span over partial positions for the single-free domain
        (free=n OR (free=y AND multiple=n)).

  stress:
    note: >
      Two labels (no complete/partial distinction). The keystone can trigger
      a blocking condition but is not itself a span endpoint.
    - label: "stress minimal"
      meaning: >
        Span from ROOT outward, stopping just before the first position where any
        element (including the keystone) has stressable ∈ {y, both} AND independence = y
        (that position begins a new independent stress domain).
    - label: "stress maximal"
      meaning: >
        Span from ROOT outward, stopping just before the first position where any
        element (including the keystone) has obligatory = y AND independence = y
        (a hard stress domain boundary).

  aspiration:
    note: Two labels — mirrors stress label structure.
    - label: "asp minimal"
      meaning: Minimal aspiration domain — mirrors stress minimal logic.
    - label: "asp maximal"
      meaning: Maximal aspiration domain — mirrors stress maximal logic.
