# Planars Codebook
# Source of truth for parameters, values, and analytical terms.
# Definitions draw on the theoretical framework in:
# Tallman, Auderset & Uchihara (eds.) (2024), "Constituency and convergence in the Americas",
# Topics in Phonological Diversity 1, Language Science Press. doi:10.5281/zenodo.10559861
# but this toolkit reflects ongoing research that extends beyond that work.
# Edit definitions directly here; a rendering script will be added to produce human-readable output.

# ---------------------------------------------------------------------------
# STRUCTURAL COLUMNS
# Present in every filled TSV.
# ---------------------------------------------------------------------------

structural_columns:

  - name: Element
    description: >
      A terminal component of a planar structure: a morph, another planar structure,
      or a well-defined subspan of a planar structure. Elements occupy positions.
      Elements with leading or trailing hyphens are wrapped in brackets (e.g. [-ed])
      to prevent misinterpretation by spreadsheet software.

  - name: Position_Name
    description: >
      The label for the position in the planar structure. Positions in the verbal
      domain are prefixed with "v:". The special value "v:verbstem" marks the
      keystone position (see Terms).

  - name: Position_Number
    description: >
      Integer index of the position in the planar structure. Lower numbers are
      further left; higher numbers are further right. The keystone (v:verbstem)
      anchors all span computations.

# ---------------------------------------------------------------------------
# PARAMETERS BY ANALYSIS
# ---------------------------------------------------------------------------

analyses:

  - name: ciscategorial
    description: >
      Tests which elements in the planar structure combine with only one part-of-speech
      category (ciscategorial selection). A ciscategorial domain is a contiguous subspan
      of positions whose elements can semantically combine with only one category class
      (V, N, or A). Elements that combine with multiple categories are transcategorial.
    parameters:

      - name: V-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a verbal head (verb root).
          An element that combines only with V (V-combines=y, N-combines=n, A-combines=n)
          is v-ciscategorial.

      - name: N-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with a nominal head (noun root).

      - name: A-combines
        values: [y, n]
        description: >
          Whether the element can semantically combine with an adjectival head.

    qualification_rule: >
      An element is v-ciscategorial if V-combines=y AND N-combines=n AND A-combines=n
      (and any further combine parameters are also n).
      A position is complete if ALL its elements are v-ciscategorial.
      A position is partial if AT LEAST ONE element is v-ciscategorial.

  - name: subspanrepetition
    description: >
      Tests which positions participate in subspan repetition — a construction in which
      a contiguous subspan of the planar structure occurs more than once (e.g. coordination,
      complementation, serial verb constructions). Fractured by scope (widescope vs.
      narrowscope) and fillability.
    parameters:

      - name: widescope_left
        values: [y, n]
        description: >
          Whether the element takes wide scope to the left in a subspan repetition
          construction — i.e., it appears in one conjunct but has semantic scope over
          multiple conjoined spans to its left. Elements with wide scope are outside
          the minimal (narrowscope) subspan repetition domain.

      - name: widescope_right
        values: [y, n]
        description: >
          Whether the element takes wide scope to the right in a subspan repetition
          construction. See widescope_left.

      - name: fillable_botheither_conjunct
        values: [y, n]
        description: >
          [PLACEHOLDER] Whether the element is fillable in both conjuncts, either
          conjunct, or a single conjunct of the subspan repetition construction.

    qualification_rule: >
      Five span categories are derived:
        maximum_fillable:          fillable_botheither_conjunct=y
        maximum_widescope_left:    widescope_left=y
        maximum_widescope_right:   widescope_right=y
        maximum_narrowscope_left:  widescope_left=n  (element lacks wide scope left)
        maximum_narrowscope_right: widescope_right=n (element lacks wide scope right)
      Each category produces complete and partial position sets and four spans
      (strict/loose x complete/partial).

  - name: noninterruption
    description: >
      Tests morphosyntactic non-interruption: a span that cannot be interrupted by
      free or multiply-occurring free elements. Two domain types are derived based
      on what counts as an interruptor.
    parameters:

      - name: free
        values: [y, n]
        description: >
          Whether the element is morphosyntactically free — i.e., it can occur as a
          standalone utterance independently of the verbal head. Bound elements (free=n)
          cannot occur independently.

      - name: multiple
        values: [y, n]
        description: >
          Whether the element can occur more than once within the domain (multiply-occurring).
          Only meaningful when free=y. A singly-occurring free element (free=y, multiple=n)
          does not interrupt the single-free domain.

    qualification_rule: >
      Two domain types, each with complete and partial position sets:
        no-free domain:     element qualifies if free=n (bound).
        single-free domain: element qualifies if free=n OR (free=y AND multiple=n).
      Only strict spans are computed for non-interruption (no loose span).

  - name: stress
    description: >
      Tests which positions fall within the prosodic stress domain of the verbal
      keystone. Two domain types are derived based on different notions of
      stress domain boundary. Parameters capture whether elements can bear stress,
      whether stress is obligatory, whether an element's stress is independent of
      neighboring elements, and whether there are leftward or rightward stress
      interactions (see issues #16, #17 for meso and interaction domains).
    parameters:

      - name: stressed
        values: [y, n, both]
        description: >
          Whether the element can carry primary stress.
          y = always stressed; n = never stressed; both = variably stressed
          depending on context.

      - name: obligatory
        values: [y, n]
        description: >
          Whether stress is obligatory on this element (i.e., the element must
          bear stress when present). This is designed to handle situations where an intervening element
          may require stress (e.g., a Full NP argument) which would block the prosodic integration of a
          some element with the keystone's domain (e.g., a verbal particle). Contrastive example: "[picked up] the ball"
          versus "[pick] the ball [up]".

      - name: independence
        values: [y, n]
        description: >
          Whether the element's stress is independent of the keystone. This can be operationalized as: Can this element 
          be stressed when the keystone is also stressed.

      - name: left-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW — see issue #17] Whether the element's stress interacts
          with elements in the planar position directly to its left.

      - name: right-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW — see issue #17] Whether the element's stress interacts
          with elements directly to its right.

    qualification_rule: >
      Two domain types, each with complete and partial subtypes = 4 spans total.
      Both use blocked_span: expand from ROOT in each direction, stopping just
      before the first position where the blocking condition holds. The blocking
      position is excluded.

      Complete vs. partial blocking:
        partial:  any element in the position satisfies the blocking condition
                  (easier to block → smaller domain).
        complete: all elements in the position satisfy the blocking condition
                  (harder to block → larger domain).

      The keystone (v:verbstem) always remains part of the domain. Its parameter
      values participate in blocking checks — its values can trigger a domain
      boundary for positions beyond it — but it is never itself excluded from the
      span. We are looking for the stress domain around the head of the clause only.

      Minimal stress domain — blocked by: stressed ∈ {y, both} AND independence = y.
        An independently-stressed element begins a new stress domain; the minimal
        domain ends just before it.

      Maximal stress domain — blocked by: obligatory = y AND independence = y.
        An obligatorily-independent stress element creates a hard boundary; the
        maximal domain extends up to but not including that position.

  - name: nonpermutability
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) and the intro §Fracturing. Verify before use.

      Tests which positions fall within the non-permutability domain of the verbal
      planar structure — a span where elements occur in a fixed linear order relative
      to one another. Two domain types are derived based on how strictly "fixed order"
      is interpreted (Tallman et al. 2024, intro §Fracturing).
    parameters:

      - name: permutable
        values: [y, n]
        description: >
          Whether the element's position can vary relative to elements of adjacent
          positions. n = fixed order (the element never swaps position with neighboring
          elements); y = variable order (the element can appear in different linear
          positions). Fixed-order elements (permutable=n) qualify for both the strict
          and flexible non-permutability domains.

      - name: scopal
        values: [y, n]
        description: >
          If permutable=y, whether variable ordering is associated with an obligatory
          difference in semantic scope. y = scopal permutation (the element qualifies
          for the flexible non-permutability domain); n = free permutation with no
          meaning difference (the element does not qualify for either domain).
          When permutable=n, this value is irrelevant (use n).

    qualification_rule: >
      Two domain types, each with complete and partial position sets = 4 strict spans.
      Both use strict span only (no loose span) — a non-permutable domain is inherently
      contiguous.

      Complete vs. partial:
        partial:  any element in the position satisfies the qualification rule
                  (easier to qualify → larger domain).
        complete: all elements in the position satisfy the qualification rule
                  (harder to qualify → smaller domain).

      Strict non-permutability — blocked by: permutable=y AND scopal=n.
        Positions where ALL (complete) or ANY (partial) elements have permutable=n.
        Identifies spans with absolutely fixed ordering under all circumstances.

      Flexible non-permutability — blocked by: permutable=y AND scopal=n.
        Positions where ALL (complete) or ANY (partial) elements have
        permutable=n OR (permutable=y AND scopal=y). Extends the strict domain
        to include positions whose elements can permute but only with a scopal
        interpretation difference (fixed vs. scope-varying ordering counts
        as "non-permutable" under this interpretation).

  - name: free_occurrence
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) §Free occurrence. Verify before use.

      Tests which positions contain free forms — elements that can constitute a
      standalone utterance independently of the verbal head. The free occurrence
      domain identifies the span of positions where free forms occur (free=y).
      Classified as an indeterminate domain (Tallman et al. 2024) because free
      occurrence sits between morphosyntactic and phonological criteria.
    parameters:

      - name: free
        values: [y, n]
        description: >
          Whether the element is morphosyntactically free — i.e., it can occur as a
          standalone utterance independently of the verbal head. Bound elements
          (free=n) cannot occur independently. This is the same parameter used in
          noninterruption; if both analyses are run, a single sheet with both
          `free` and `multiple` columns covers both.

    qualification_rule: >
      The free occurrence domain = positions where free=y.
      Four span variants (strict/loose × complete/partial) = 4 spans total.
        complete: ALL elements in the position have free=y.
        partial:  AT LEAST ONE element in the position has free=y.
      Both strict and loose spans are computed (unlike noninterruption, which uses
      strict-only, free occurrence domains need not be contiguous).

  - name: aspiration
    description: >
      [NEEDS REVIEW] Tests which positions fall within the aspiration domain of
      the verbal planar structure. Shares parameter structure with stress.
    parameters:

      - name: stressed
        values: [y, n, both]
        description: >
          [NEEDS REVIEW] Whether the element can carry aspiration. Reuses the
          stressed parameter name from the stress analysis; values have the
          same interpretation in the context of aspiration.

      - name: obligatory
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether aspiration is obligatory on this element.

      - name: independence
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether the element's aspiration is independent of
          neighboring elements.

      - name: left-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether the element's aspiration interacts with elements
          to its left.

      - name: right-interaction
        values: [y, n]
        description: >
          [NEEDS REVIEW] Whether the element's aspiration interacts with elements
          to its right.

    qualification_rule: >
      Mirrors the stress domain logic. Two domain types (minimal, maximal) using
      blocked_span with the same blocking conditions as stress. The keystone
      participates in blocking checks (same as stress). If aspiration requires
      different domain logic once data is collected, update this entry and
      aspiration.py accordingly.

  - name: biuniqueness
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) §Extended exponence. Verify before use.

      Tests for deviations from biuniqueness — spans defined by phenomena such as
      circumfixation (a morpheme discontinuous across positions) and extended
      exponence (the same morphosyntactic feature expressed by multiple morphs in
      different positions). The biuniqueness domain is the span from the leftmost
      piece of the extended exponent to the rightmost piece. Classified as an
      indeterminate domain (Tallman et al. 2024). Each circumfix or extended
      exponent group is annotated in its own TSV (one construction per file).
      In Araona: the negation circumfix (pi-…-ma) identifies a vpref–tamesuf
      domain; the interactional circumfix (ja-…-ti) identifies a vpref–ti domain.
    parameters:
      - name: biunique
        values: [y, n]
        description: >
          Whether the element participates in a biunique (one-form / one-meaning)
          relationship. y = the element is biunique (not part of an extended
          exponent). n = the element is one of the pieces of a circumfix or
          extended exponent set and therefore deviates from strict biuniqueness.
    qualification_rule: >
      A position qualifies if it contains an element where biunique=n. Complete
      qualification: ALL elements in the position have biunique=n. Partial
      qualification: at least one element has biunique=n. The loose partial span
      is the most semantically informative: it extends from the position of the
      prefixal piece to the position of the suffixal piece, directly identifying
      the extended exponent domain.

  - name: repair
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 2
      (Cup'ik) §Repair domain. Verify before use.

      Tests which span speakers restart from when they make a production error.
      The repair domain is the minimal span such that, when an error occurs at
      any position within it, the speaker returns to the left edge and restarts
      from there rather than resuming from the error point. In Cup'ik, the repair
      domain corresponds to the traditional Verb Word (vbase–pn4). Classified as
      a phonological domain type (Tallman et al. 2024, discussion ch. 17).
    parameters:
      - name: restart
        values: [y, n]
        description: >
          Whether this element's position is within the repair domain. y = an
          error at this position triggers restart from the domain's left edge.
    qualification_rule: >
      A position qualifies if it contains an element where restart=y. Complete
      qualification: ALL elements in the position have restart=y. Partial
      qualification: at least one element has restart=y.

  - name: pausing
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design was automatically derived from
      the description in Tallman et al. 2024 (langsci/291), Discussion ch. 17 only —
      no concrete language data was reviewed. Parameter design is speculative.
      Verify thoroughly before use.

      Tests which spans are delimited by prosodic pause boundaries. The pausing
      domain is a span where elements cannot be separated by a prosodic pause —
      the span constitutes a pause unit. Positions outside the domain permit
      pause insertion. Classified as a phonological domain type (Tallman et al.
      2024, discussion ch. 17).
    parameters:
      - name: pause_domain
        values: [y, n]
        description: >
          Whether this element's position is within the pause domain. y = a
          pause cannot be inserted between this position and adjacent positions
          within the domain.
    qualification_rule: >
      A position qualifies if it contains an element where pause_domain=y.
      Complete qualification: ALL elements in the position have pause_domain=y.
      Partial qualification: at least one element has pause_domain=y.

  - name: proform
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design was automatically derived from
      the description in Tallman et al. 2024 (langsci/291), Discussion ch. 17 only —
      no concrete language data was reviewed. Parameter design is speculative.
      Verify thoroughly before use.

      Tests which spans can be replaced by a proform (pronoun, pro-verb, pro-VP,
      etc.). The proform domain is the span that the proform substitutes for.
      Classified as a morphosyntactic domain type (Tallman et al. 2024, discussion
      ch. 17).
    parameters:
      - name: substitutable
        values: [y, n]
        description: >
          Whether a proform can replace elements at this position — i.e., whether
          this position falls within the span the proform substitutes for.
    qualification_rule: >
      A position qualifies if it contains an element where substitutable=y.
      Complete qualification: ALL elements have substitutable=y. Partial
      qualification: at least one element has substitutable=y.

  - name: play_language
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design was automatically derived from
      reading Tallman et al. 2024 (langsci/291), Discussion ch. 17 and a brief
      mention in ch. 8 (Chatino) — no complete language data section was reviewed.
      Parameter design is speculative. Verify thoroughly before use.

      Tests which spans are targeted by play language (ludling) operations —
      e.g., infixation in pig-Latin-like games, reversal or permutation of
      elements within a span. The play language domain is the span within which
      the ludling operation applies. Currently attested in Zenzontepec Chatino
      (ch. 8). Classified as a phonological domain type (Tallman et al. 2024,
      discussion ch. 17).
    parameters:
      - name: applies
        values: [y, n]
        description: >
          Whether the play language operation targets this element's position.
          y = this position is within the domain of the ludling operation.
    qualification_rule: >
      A position qualifies if it contains an element where applies=y. Complete
      qualification: ALL elements have applies=y. Partial qualification: at
      least one element has applies=y.

  - name: idiom
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design was automatically derived from
      the description in Tallman et al. 2024 (langsci/291), Discussion ch. 17 only —
      no concrete language data was reviewed. Parameter design is speculative.
      Verify thoroughly before use.

      Tests which spans form idiomatic units — spans where the combination of
      elements has a meaning not predictable from the individual elements.
      The idiom domain is the span covered by the idiomatic unit. Classified
      as a morphosyntactic domain type (Tallman et al. 2024, discussion ch. 17).
    parameters:
      - name: idiomatic
        values: [y, n]
        description: >
          Whether this element participates in an idiomatic (non-compositional)
          combination. y = this element is part of an idiomatic unit.
    qualification_rule: >
      A position qualifies if it contains an element where idiomatic=y. Complete
      qualification: ALL elements have idiomatic=y. Partial qualification: at
      least one element has idiomatic=y.

  - name: segmental
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) §Vowel syncope and ch. 2 (Cup'ik) §Segmental domains. Verify before use.

      Tests which span is governed by a segmental (non-prosodic) phonological process.
      Examples: vowel deletion/coalescence at position junctures (Araona: vowel syncope
      domain vcore–tamesuf), consonant coalescence (Cup'ik: uvular-velar coalescence
      domain vbase–pn4), nasality spreading, palatalization. Each process is annotated
      in its own TSV (one construction per file). Multiple segmental processes in one
      language may identify different spans. Classified as a phonological domain type
      (Tallman et al. 2024, discussion ch. 17).
    parameters:
      - name: applies
        values: [y, n]
        description: >
          Whether the segmental phonological process applies to or at this element's
          position. y = this position is within the domain of the process.
    qualification_rule: >
      A position qualifies if it contains an element where applies=y. Complete
      qualification: ALL elements in the position have applies=y. Partial
      qualification: at least one element has applies=y.

  - name: suprasegmental
    description: >
      [AUTO-DERIVED: NEEDS REVIEW] Parameter design and qualification rules were
      automatically derived from reading Tallman et al. 2024 (langsci/291), ch. 13
      (Araona) §Pitch-accent domains and ch. 2 (Cup'ik) §Prosodic domains. Verify
      before use.

      Tests which span is governed by a suprasegmental (prosodic) phonological process.
      Examples: pitch-accent assignment domain (Araona: LH* domain vpref–connect3),
      iambic stress foot domain (Cup'ik: vbase–pn4), tone melody span. Each process
      is annotated in its own TSV. Note that stress domains identifiable via blocking
      conditions (e.g., independence of primary stress) are handled by stress.py and
      aspiration.py using blocked_span logic; this module handles suprasegmental domains
      where positions are annotated positively as within or outside the domain.
      Classified as a phonological domain type (Tallman et al. 2024, discussion ch. 17).
    parameters:
      - name: applies
        values: [y, n]
        description: >
          Whether the suprasegmental phonological process applies to this element's
          position. y = this position is within the domain of the prosodic rule.
    qualification_rule: >
      A position qualifies if it contains an element where applies=y. Complete
      qualification: ALL elements in the position have applies=y. Partial
      qualification: at least one element has applies=y.

# ---------------------------------------------------------------------------
# SHARED PARAMETER VALUES
# ---------------------------------------------------------------------------

shared_values:

  - value: "y"
    meaning: Yes — the parameter holds for this element in this construction.

  - value: "n"
    meaning: No — the parameter does not hold for this element in this construction.

  - value: "NA"
    meaning: >
      Not applicable. Used only for keystone rows (v:verbstem), which are
      excluded from all span computations.

  - value: "?"
    meaning: >
      Unknown or not yet annotated. Treated as missing data; rows with "?"
      will cause validation errors if passed to an analysis function.

# ---------------------------------------------------------------------------
# TERMS
# ---------------------------------------------------------------------------

terms:

  - term: planar structure
    definition: >
      A maximally flat hypothesis space for coding the results of constituency tests.
      Contains an ordered sequence of positions fit out by elements, scoping over a
      whole sentence without regard to orthographic word boundaries. Languages have
      a separate planar structure for each part-of-speech distinction (verbal, nominal,
      adjectival, etc.).

  - term: position
    definition: >
      A non-terminal slot in the planar structure. Positions are of two types:
      slots (where only one element can occur at a time) and zones (where multiple
      elements can occur in any order). Each position has a name and an integer index.

  - term: element
    definition: >
      A terminal component that fills a position: a morph, another planar structure,
      or a well-defined subspan of a planar structure. Multiple elements can occupy
      the same position; each is annotated independently.

  - term: keystone
    definition: >
      The semantic head of the planar structure — in a verbal planar structure, the
      verb root. Identified by Position_Name == "v:verbstem". Every planar structure
      has exactly one keystone position. It anchors all span computations but is
      excluded from qualification tests.

  - term: partial position
    definition: >
      A position in which AT LEAST ONE element satisfies the qualification rule
      for a given analysis. Partial positions define the widest possible span
      under that analysis.

  - term: complete position
    definition: >
      A position in which ALL elements satisfy the qualification rule for a given
      analysis. Complete positions define a more conservative span.

  - term: strict span
    definition: >
      The contiguous range of qualifying positions anchored at the keystone.
      Expansion stops at the first gap (non-qualifying position) on either side.
      Analogous to a minimal domain derived by positive evidence only.

  - term: loose span
    definition: >
      The range from the farthest qualifying position on the left to the farthest
      on the right of the keystone, regardless of intervening gaps. Always >= the
      strict span. Analogous to a maximal domain.

  - term: ciscategorial
    definition: >
      Describes an element or position that combines with only one part-of-speech
      category (V, N, or A). Contrasts with transcategorial, which applies to
      elements that can combine with multiple categories.

  - term: transcategorial
    definition: >
      Describes an element that can semantically combine with more than one
      part-of-speech category. Transcategorial elements are excluded from
      ciscategorial domains.

  - term: subspan repetition
    definition: >
      A construction in which a contiguous subspan of the planar structure occurs
      more than once (e.g. coordination, complementation, serial verb constructions).
      Fractured into minimal (narrowscope) and maximal (widescope) versions.

  - term: wide scope
    definition: >
      A property of an element in a subspan repetition construction whereby the
      element appears in one conjunct but has semantic scope over multiple conjoined
      spans. Wide-scope elements are outside the minimal subspan repetition domain.

  - term: narrow scope
    definition: >
      A property of an element confined to a single conjunct in a subspan repetition
      construction, with no scope over repeated spans. Narrowscope elements define
      the minimal subspan repetition domain.

  - term: non-interruption domain
    definition: >
      A span that cannot be interrupted by a free or multiply-occurring free element.
      Two versions are distinguished: the no-free domain (interrupted only by bound
      elements) and the single-free domain (allows singly-occurring free elements).

# ---------------------------------------------------------------------------
# CHART LABEL GLOSSARY
# Short labels used in domain_chart() output (planars/charts.py).
# These are subject to revision pending input from collaborators.
# ---------------------------------------------------------------------------

chart_labels:

  ciscategorial:
    - label: "cisc strict complete"
      meaning: Strict span over complete positions for the v-ciscategorial analysis.
    - label: "cisc loose complete"
      meaning: Loose span over complete positions for the v-ciscategorial analysis.
    - label: "cisc strict partial"
      meaning: Strict span over partial positions for the v-ciscategorial analysis.
    - label: "cisc loose partial"
      meaning: Loose span over partial positions for the v-ciscategorial analysis.

  subspanrepetition:
    prefixes:
      fill:  maximum_fillable — positions where fillable_botheither_conjunct=y
      ws-L:  maximum_widescope_left — positions where widescope_left=y
      ws-R:  maximum_widescope_right — positions where widescope_right=y
      ns-L:  maximum_narrowscope_left — positions where widescope_left=n
      ns-R:  maximum_narrowscope_right — positions where widescope_right=n
    suffixes:
      "strict complete": Strict span over complete positions.
      "loose complete":  Loose span over complete positions.
      "strict partial":  Strict span over partial positions.
      "loose partial":   Loose span over partial positions.
    note: >
      Labels are formed by combining a prefix and a suffix, e.g. "fill strict complete",
      "ws-L loose partial". This yields 20 labels (5 prefixes × 4 suffixes).

  noninterruption:
    - label: "no-free complete"
      meaning: Strict span over complete positions for the no-free domain (free=n).
    - label: "no-free partial"
      meaning: Strict span over partial positions for the no-free domain (free=n).
    - label: "1-free complete"
      meaning: >
        Strict span over complete positions for the single-free domain
        (free=n OR (free=y AND multiple=n)).
    - label: "1-free partial"
      meaning: >
        Strict span over partial positions for the single-free domain
        (free=n OR (free=y AND multiple=n)).

  stress:
    note: >
      Four labels (minimal/maximal × partial/complete). The keystone can trigger
      a blocking condition but is not itself a span endpoint.
    labels:
      - label: "stress minimal partial"
        meaning: >
          Minimal stress domain, partial blocking: expand from ROOT, stopping just before
          the first position where ANY element has stressed ∈ {y, both} AND independence = y.
          Partial blocking is easier to trigger → smaller domain.
      - label: "stress minimal complete"
        meaning: >
          Minimal stress domain, complete blocking: expand from ROOT, stopping just before
          the first position where ALL elements have stressed ∈ {y, both} AND independence = y.
          Complete blocking is harder to trigger → larger domain.
      - label: "stress maximal partial"
        meaning: >
          Maximal stress domain, partial blocking: expand from ROOT, stopping just before
          the first position where ANY element has obligatory = y AND independence = y.
      - label: "stress maximal complete"
        meaning: >
          Maximal stress domain, complete blocking: expand from ROOT, stopping just before
          the first position where ALL elements have obligatory = y AND independence = y.

  nonpermutability:
    - label: "nonperm strict complete"
      meaning: >
        Strict (absolutely fixed order) non-permutability domain, complete positions:
        ALL elements in each position have permutable=n.
    - label: "nonperm strict partial"
      meaning: >
        Strict non-permutability domain, partial positions:
        AT LEAST ONE element has permutable=n.
    - label: "nonperm flexible complete"
      meaning: >
        Flexible (fixed or scopal) non-permutability domain, complete positions:
        ALL elements have permutable=n OR (permutable=y AND scopal=y).
    - label: "nonperm flexible partial"
      meaning: >
        Flexible non-permutability domain, partial positions:
        AT LEAST ONE element has permutable=n OR (permutable=y AND scopal=y).

  free_occurrence:
    - label: "free strict complete"
      meaning: Strict span over complete positions where all elements are free forms (free=y).
    - label: "free loose complete"
      meaning: Loose span over complete positions where all elements are free forms.
    - label: "free strict partial"
      meaning: Strict span over partial positions where at least one element is a free form.
    - label: "free loose partial"
      meaning: Loose span over partial positions where at least one element is a free form.

  biuniqueness:
    - label: "biuniq strict complete"
      meaning: Strict span over complete positions where all elements are pieces of the extended exponent (biunique=n).
    - label: "biuniq loose complete"
      meaning: Loose span over complete positions where all elements are pieces of the extended exponent.
    - label: "biuniq strict partial"
      meaning: Strict span over partial positions where at least one element is a piece of the extended exponent.
    - label: "biuniq loose partial"
      meaning: Loose span over partial positions where at least one element is a piece of the extended exponent. The primary domain span — extends from the prefixal piece to the suffixal piece.

  repair:
    - label: "repair strict complete"
      meaning: Strict span over complete positions where all elements are within the repair domain (restart=y).
    - label: "repair loose complete"
      meaning: Loose span over complete positions where all elements are within the repair domain.
    - label: "repair strict partial"
      meaning: Strict span over partial positions where at least one element is within the repair domain.
    - label: "repair loose partial"
      meaning: Loose span over partial positions where at least one element is within the repair domain.

  segmental:
    - label: "seg strict complete"
      meaning: Strict span over complete positions where the segmental phonological process applies to all elements.
    - label: "seg loose complete"
      meaning: Loose span over complete positions where the segmental process applies to all elements.
    - label: "seg strict partial"
      meaning: Strict span over partial positions where the segmental process applies to at least one element.
    - label: "seg loose partial"
      meaning: Loose span over partial positions where the segmental process applies to at least one element.

  suprasegmental:
    - label: "supra strict complete"
      meaning: Strict span over complete positions where the suprasegmental process applies to all elements.
    - label: "supra loose complete"
      meaning: Loose span over complete positions where the suprasegmental process applies to all elements.
    - label: "supra strict partial"
      meaning: Strict span over partial positions where the suprasegmental process applies to at least one element.
    - label: "supra loose partial"
      meaning: Loose span over partial positions where the suprasegmental process applies to at least one element.

  pausing:
    - label: "pause strict complete"
      meaning: Strict span over complete positions where all elements are within the pause domain (pause_domain=y).
    - label: "pause loose complete"
      meaning: Loose span over complete positions where all elements are within the pause domain.
    - label: "pause strict partial"
      meaning: Strict span over partial positions where at least one element is within the pause domain.
    - label: "pause loose partial"
      meaning: Loose span over partial positions where at least one element is within the pause domain.

  proform:
    - label: "proform strict complete"
      meaning: Strict span over complete positions where all elements are substitutable by a proform.
    - label: "proform loose complete"
      meaning: Loose span over complete positions where all elements are substitutable.
    - label: "proform strict partial"
      meaning: Strict span over partial positions where at least one element is substitutable by a proform.
    - label: "proform loose partial"
      meaning: Loose span over partial positions where at least one element is substitutable.

  play_language:
    - label: "play strict complete"
      meaning: Strict span over complete positions where the play language operation applies to all elements.
    - label: "play loose complete"
      meaning: Loose span over complete positions where the play language operation applies to all elements.
    - label: "play strict partial"
      meaning: Strict span over partial positions where the play language operation applies to at least one element.
    - label: "play loose partial"
      meaning: Loose span over partial positions where the play language operation applies to at least one element.

  idiom:
    - label: "idiom strict complete"
      meaning: Strict span over complete positions where all elements are idiomatic (part of a non-compositional unit).
    - label: "idiom loose complete"
      meaning: Loose span over complete positions where all elements are idiomatic.
    - label: "idiom strict partial"
      meaning: Strict span over partial positions where at least one element is idiomatic.
    - label: "idiom loose partial"
      meaning: Loose span over partial positions where at least one element is idiomatic.

  aspiration:
    note: Four labels — mirrors stress label structure.
    labels:
      - label: "asp minimal partial"
        meaning: Minimal aspiration domain, partial blocking — mirrors stress minimal partial logic.
      - label: "asp minimal complete"
        meaning: Minimal aspiration domain, complete blocking — mirrors stress minimal complete logic.
      - label: "asp maximal partial"
        meaning: Maximal aspiration domain, partial blocking — mirrors stress maximal partial logic.
      - label: "asp maximal complete"
        meaning: Maximal aspiration domain, complete blocking — mirrors stress maximal complete logic.

# ---------------------------------------------------------------------------
# ELEMENT CONVENTIONS
# ---------------------------------------------------------------------------
# Conventions for the Elements column in planar structure TSVs.
# The Class_Type column determines which convention applies.
#
#   list   — an exhaustive enumeration of morphemes or forms
#             Elements are lower-case orthographic/transcribed representations.
#             Example: "-ed, -s, -ing"
#
#   open   — a position occupied by an open or semi-open class
#             Elements are ALL CAPS category labels, optionally refined with
#             brace notation.  Lower-case items may appear alongside ALL CAPS
#             labels as shorthand for "additional closed-class items not listed".
#             Example: "NP{S,A}, CONJUNCT, tso"
#
#   closed — a finite but not exhaustively listed set of forms
#             Behaviour between list and open; conventions as for list.
#
# ALL CAPS label notation:
#   LABEL         — plain category label
#   LABEL{X,Y}    — LABEL restricted to roles/subtypes X and Y
#
# The label KEYSTONE is reserved for the v:verbstem position.

element_conventions:

  standard_labels:
    note: >
      Canonical ALL CAPS category labels analogous to the Leipzig Glossing Rules.
      Use these wherever applicable for cross-language consistency.
      Language-specific labels are permitted but should be documented here when reused.

    phrase_types:
      - label: NP
        gloss: Noun phrase (any grammatical role unless further specified in braces)
      - label: PP
        gloss: Adpositional phrase (prepositional or postpositional)
      - label: S
        gloss: Clause / sentence
      - label: AP
        gloss: Adjective phrase
      - label: ADVP
        gloss: Adverb phrase (when scope is unspecified; prefer AD-S / AD-VP / AD-V when scope is known)
      - label: VP
        gloss: Verb phrase

    adverb_scope_labels:
      note: >
        Project-specific labels for adverb positions classified by their scope of modification.
        Use a hyphen to separate the AD prefix from the scope domain letter.
      items:
        - label: AD-S
          gloss: Sentence-scoped adverb (modifies the entire clause)
        - label: AD-VP
          gloss: VP-scoped adverb (modifies the verb phrase)
        - label: AD-V
          gloss: V-scoped adverb (modifies the verb stem only)

    other_labels:
      - label: PRON
        gloss: Pronoun
      - label: CONJUNCT
        gloss: Coordinating conjunction or conjunct (use when the full list is open-ended)
      - label: QWORDS
        gloss: Question words / wh-words (interrogative expressions)
      - label: VERBPART
        gloss: Verbal particle
      - label: KEYSTONE
        gloss: Reserved. Marks the v:verbstem position in the Elements column.

    brace_role_labels:
      note: >
        Labels used inside braces to restrict a phrase-type label to specific
        grammatical roles. Example: NP{S,A} = NPs in subject or agent role.
        Note: S used as a role label (subject) is distinct from S as a phrase
        type (clause) — context (braces vs. standalone) disambiguates.
      items:
        - label: S
          gloss: Subject
        - label: A
          gloss: Agent (transitive subject)
        - label: P
          gloss: Patient (transitive object)
        - label: T
          gloss: Theme
        - label: R
          gloss: Recipient / Goal
        - label: O
          gloss: Object (when A/P distinction is not made)
